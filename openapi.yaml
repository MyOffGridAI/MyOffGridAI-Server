  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 8 — System
  # ═══════════════════════════════════════════════════════════════════════════

  /api/system/status:
    get:
      tags: [System]
      summary: Get current system status
      description: Public endpoint — no authentication required.
      operationId: getSystemStatus
      security: []
      responses:
        '200':
          description: System status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SystemStatusDto'

  /api/system/initialize:
    post:
      tags: [System]
      summary: Initialize the system on first boot
      description: >
        Creates the OWNER account and marks the system as initialized.
        Public endpoint — no auth required. Can only be called once; subsequent
        calls return 409 Conflict.
      operationId: initializeSystem
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitializeRequest'
      responses:
        '200':
          description: System initialized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AuthResponse'
        '409':
          description: System is already initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 8 — Privacy & Fortress
  # ═══════════════════════════════════════════════════════════════════════════

  /api/privacy/fortress/status:
    get:
      tags: [Privacy]
      summary: Get the current fortress mode status
      operationId: getFortressStatus
      responses:
        '200':
          description: Fortress status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_FortressStatus'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/privacy/fortress/enable:
    post:
      tags: [Privacy]
      summary: Enable fortress mode (blocks all outbound internet traffic)
      description: Restricted to OWNER or ADMIN roles.
      operationId: enableFortress
      responses:
        '200':
          description: Fortress mode enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_StatusMap'
        '403':
          description: Forbidden — requires OWNER or ADMIN role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/privacy/fortress/disable:
    post:
      tags: [Privacy]
      summary: Disable fortress mode (restores normal network connectivity)
      description: Restricted to OWNER or ADMIN roles.
      operationId: disableFortress
      responses:
        '200':
          description: Fortress mode disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_StatusMap'
        '403':
          description: Forbidden — requires OWNER or ADMIN role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/privacy/sovereignty-report:
    get:
      tags: [Privacy]
      summary: Generate a sovereignty report
      operationId: getSovereigntyReport
      responses:
        '200':
          description: Sovereignty report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SovereigntyReport'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/privacy/audit-logs:
    get:
      tags: [Privacy]
      summary: Get audit logs with optional filters
      description: >
        OWNER/ADMIN can view all logs; regular users see only their own.
      operationId: getAuditLogs
      parameters:
        - name: outcome
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AuditOutcome'
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated audit logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AuditLogDtoList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/privacy/export:
    post:
      tags: [Privacy]
      summary: Export all user data as an AES-256-GCM encrypted ZIP archive
      operationId: exportData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: Encrypted ZIP file download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
              description: 'attachment; filename="myoffgridai-export-{userId}.enc"'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/privacy/wipe:
    delete:
      tags: [Privacy]
      summary: Wipe all data for a target user
      description: >
        OWNER/ADMIN can wipe any user's data. The targetId parameter
        defaults to the authenticated user's own ID.
      operationId: wipeData
      parameters:
        - name: targetId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Target user ID to wipe (defaults to self)
      responses:
        '200':
          description: Data wipe completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_WipeResult'
        '403':
          description: Forbidden — requires OWNER or ADMIN role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/privacy/wipe/self:
    delete:
      tags: [Privacy]
      summary: Wipe the authenticated user's own data
      description: Available to all authenticated users.
      operationId: wipeSelfData
      responses:
        '200':
          description: User data wiped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_WipeResult'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

# ═══════════════════════════════════════════════════════════════════════════════
# Components
# ═══════════════════════════════════════════════════════════════════════════════

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token authentication. Access tokens expire after 24 hours.

  schemas:

    # ── ApiResponse Envelope ──────────────────────────────────────────────────

    ApiResponse:
      type: object
      description: >
        Standard API response wrapper. All endpoints return this envelope.
        Fields totalElements, page, and size are only present on paginated responses.
      properties:
        success:
          type: boolean
          description: Whether the request was successful
        message:
          type: string
          nullable: true
          description: Human-readable message (present on success with message, or on error)
        data:
          description: The response payload (type varies by endpoint)
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 response timestamp
        requestId:
          type: string
          description: Unique request ID for tracing
        totalElements:
          type: integer
          format: int64
          nullable: true
          description: Total number of elements across all pages (paginated responses only)
        page:
          type: integer
          nullable: true
          description: Current page number, zero-based (paginated responses only)
        size:
          type: integer
          nullable: true
          description: Page size (paginated responses only)
      required:
        - success
        - timestamp
        - requestId

    ApiResponse_Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Error description"
        data:
          nullable: true
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponse_Void:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          nullable: true
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    # ── Auth Schemas ──────────────────────────────────────────────────────────

    RegisterRequest:
      type: object
      required: [username, displayName, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        password:
          type: string
          minLength: 4
          description: Minimum 4 characters in development, 12 in production
        role:
          $ref: '#/components/schemas/Role'

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          format: int64
          description: Access token expiration in milliseconds
          example: 86400000
        user:
          $ref: '#/components/schemas/UserSummaryDto'

    UserSummaryDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        isActive:
          type: boolean

    UserDetailDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
          nullable: true

    UpdateUserRequest:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'

    Role:
      type: string
      enum:
        - ROLE_OWNER
        - ROLE_ADMIN
        - ROLE_MEMBER
        - ROLE_VIEWER
        - ROLE_CHILD
      description: >
        Security roles: ROLE_OWNER (full system access, created at first boot),
        ROLE_ADMIN (all features + user management), ROLE_MEMBER (full AI features, own data),
        ROLE_VIEWER (read-only), ROLE_CHILD (safe mode, filtered responses, no vault access)

    # ── Chat / AI Schemas ─────────────────────────────────────────────────────

    CreateConversationRequest:
      type: object
      properties:
        title:
          type: string
          nullable: true
          description: Optional title for the conversation

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          maxLength: 32000
        stream:
          type: boolean
          default: false
          description: If true, returns SSE stream; if false, returns JSON response

    ConversationDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        isArchived:
          type: boolean
        messageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConversationSummaryDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        isArchived:
          type: boolean
        messageCount:
          type: integer
        updatedAt:
          type: string
          format: date-time
        lastMessagePreview:
          type: string
          nullable: true

    MessageDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/MessageRole'
        content:
          type: string
        tokenCount:
          type: integer
          nullable: true
        hasRagContext:
          type: boolean
        createdAt:
          type: string
          format: date-time

    MessageRole:
      type: string
      enum: [USER, ASSISTANT, SYSTEM]

    # ── Model Schemas ─────────────────────────────────────────────────────────

    OllamaModelInfo:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
          format: int64
          description: Model size in bytes
        modifiedAt:
          type: string
          format: date-time

    ActiveModelDto:
      type: object
      properties:
        modelName:
          type: string
          example: "qwen3:32b"
        embedModelName:
          type: string
          example: "nomic-embed-text"

    OllamaHealthDto:
      type: object
      properties:
        available:
          type: boolean
        activeModel:
          type: string
        embedModelName:
          type: string
        responseTimeMs:
          type: integer
          format: int64

    # ── Memory Schemas ────────────────────────────────────────────────────────

    MemoryDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        importance:
          $ref: '#/components/schemas/MemoryImportance'
        tags:
          type: string
          nullable: true
        sourceConversationId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastAccessedAt:
          type: string
          format: date-time
          nullable: true
        accessCount:
          type: integer

    MemoryImportance:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    UpdateImportanceRequest:
      type: object
      required: [importance]
      properties:
        importance:
          $ref: '#/components/schemas/MemoryImportance'

    UpdateTagsRequest:
      type: object
      properties:
        tags:
          type: string
          nullable: true

    MemorySearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        topK:
          type: integer
          minimum: 1
          maximum: 20
          default: 5

    MemorySearchResultDto:
      type: object
      properties:
        memory:
          $ref: '#/components/schemas/MemoryDto'
        similarityScore:
          type: number
          format: float
          description: Cosine similarity score (0.0 to 1.0)

    # ── Knowledge Schemas ─────────────────────────────────────────────────────

    KnowledgeDocumentDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        displayName:
          type: string
          nullable: true
        mimeType:
          type: string
        fileSizeBytes:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/DocumentStatus'
        errorMessage:
          type: string
          nullable: true
        chunkCount:
          type: integer
        uploadedAt:
          type: string
          format: date-time
        processedAt:
          type: string
          format: date-time
          nullable: true

    DocumentStatus:
      type: string
      enum: [PENDING, PROCESSING, READY, FAILED]

    UpdateDisplayNameRequest:
      type: object
      required: [displayName]
      properties:
        displayName:
          type: string
          maxLength: 255

    KnowledgeSearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          maxLength: 2000
        topK:
          type: integer
          nullable: true
          description: Number of top results to return (defaults to 5 if null)

    KnowledgeSearchResultDto:
      type: object
      properties:
        chunkId:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        documentName:
          type: string
        content:
          type: string
        pageNumber:
          type: integer
          nullable: true
        chunkIndex:
          type: integer
        similarityScore:
          type: number
          format: float

    # ── Skills Schemas ────────────────────────────────────────────────────────

    SkillDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        displayName:
          type: string
        description:
          type: string
        version:
          type: string
        author:
          type: string
        category:
          $ref: '#/components/schemas/SkillCategory'
        isEnabled:
          type: boolean
        isBuiltIn:
          type: boolean
        parametersSchema:
          type: string
          nullable: true
          description: JSON schema defining expected parameters
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SkillCategory:
      type: string
      enum: [HOMESTEAD, RESOURCE, PLANNING, KNOWLEDGE, WEATHER, CUSTOM]

    SkillExecuteRequest:
      type: object
      required: [skillId]
      properties:
        skillId:
          type: string
          format: uuid
        params:
          type: object
          additionalProperties: true
          nullable: true

    SkillExecutionDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        skillId:
          type: string
          format: uuid
        skillName:
          type: string
        userId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ExecutionStatus'
        inputParams:
          type: string
          nullable: true
          description: JSON string of input parameters
        outputResult:
          type: string
          nullable: true
          description: JSON string of output result
        errorMessage:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        durationMs:
          type: integer
          format: int64
          nullable: true

    ExecutionStatus:
      type: string
      enum: [RUNNING, COMPLETED, FAILED]

    # ── Inventory Schemas ─────────────────────────────────────────────────────

    InventoryItemDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        category:
          $ref: '#/components/schemas/InventoryCategory'
        quantity:
          type: number
          format: double
        unit:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        lowStockThreshold:
          type: number
          format: double
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InventoryCategory:
      type: string
      enum: [FOOD, TOOLS, MEDICAL, SUPPLIES, SEEDS, EQUIPMENT, OTHER]

    CreateInventoryItemRequest:
      type: object
      required: [name, category, quantity]
      properties:
        name:
          type: string
        category:
          $ref: '#/components/schemas/InventoryCategory'
        quantity:
          type: number
          format: double
          minimum: 0
        unit:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        lowStockThreshold:
          type: number
          format: double
          nullable: true

    UpdateInventoryItemRequest:
      type: object
      properties:
        quantity:
          type: number
          format: double
          minimum: 0
          nullable: true
        notes:
          type: string
          nullable: true
        lowStockThreshold:
          type: number
          format: double
          nullable: true

    # ── Sensor Schemas ────────────────────────────────────────────────────────

    SensorDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: '#/components/schemas/SensorType'
        portPath:
          type: string
        baudRate:
          type: integer
        dataFormat:
          $ref: '#/components/schemas/DataFormat'
        valueField:
          type: string
          nullable: true
        unit:
          type: string
          nullable: true
        isActive:
          type: boolean
        pollIntervalSeconds:
          type: integer
        lowThreshold:
          type: number
          format: double
          nullable: true
        highThreshold:
          type: number
          format: double
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SensorType:
      type: string
      enum: [TEMPERATURE, HUMIDITY, SOIL_MOISTURE, POWER, VOLTAGE, CUSTOM]

    DataFormat:
      type: string
      enum: [CSV_LINE, JSON_LINE]

    SensorReadingDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sensorId:
          type: string
          format: uuid
        value:
          type: number
          format: double
        rawData:
          type: string
          nullable: true
        recordedAt:
          type: string
          format: date-time

    CreateSensorRequest:
      type: object
      required: [name, type, portPath]
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/SensorType'
        portPath:
          type: string
          description: Serial port path (e.g. "/dev/ttyUSB0")
        baudRate:
          type: integer
          nullable: true
          description: Defaults to 9600
        dataFormat:
          $ref: '#/components/schemas/DataFormat'
        valueField:
          type: string
          nullable: true
          description: JSON field name for value extraction (JSON_LINE format only)
        unit:
          type: string
          nullable: true
        pollIntervalSeconds:
          type: integer
          minimum: 5
          maximum: 3600
          nullable: true
        lowThreshold:
          type: number
          format: double
          nullable: true
        highThreshold:
          type: number
          format: double
          nullable: true

    UpdateThresholdsRequest:
      type: object
      properties:
        lowThreshold:
          type: number
          format: double
          nullable: true
          description: Null to clear threshold
        highThreshold:
          type: number
          format: double
          nullable: true
          description: Null to clear threshold

    TestSensorRequest:
      type: object
      required: [portPath]
      properties:
        portPath:
          type: string
        baudRate:
          type: integer
          nullable: true
          description: Defaults to 9600

    SensorTestResult:
      type: object
      properties:
        success:
          type: boolean
        portPath:
          type: string
        baudRate:
          type: integer
        sampleData:
          type: string
          nullable: true
        message:
          type: string

    # ── Insight Schemas ───────────────────────────────────────────────────────

    InsightDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        category:
          $ref: '#/components/schemas/InsightCategory'
        isRead:
          type: boolean
        isDismissed:
          type: boolean
        generatedAt:
          type: string
          format: date-time
        readAt:
          type: string
          format: date-time
          nullable: true

    InsightCategory:
      type: string
      enum: [HOMESTEAD, HEALTH, RESOURCE, GENERAL]

    # ── Notification Schemas ──────────────────────────────────────────────────

    NotificationDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        type:
          $ref: '#/components/schemas/NotificationType'
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
        readAt:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: string
          nullable: true

    NotificationType:
      type: string
      enum: [SENSOR_ALERT, SYSTEM_HEALTH, INSIGHT_READY, MODEL_UPDATE, GENERAL]

    # ── System Schemas ────────────────────────────────────────────────────────

    SystemStatusDto:
      type: object
      properties:
        initialized:
          type: boolean
        instanceName:
          type: string
          nullable: true
        fortressEnabled:
          type: boolean
        wifiConfigured:
          type: boolean
        serverVersion:
          type: string
          example: "1.0.0"
        timestamp:
          type: string
          format: date-time

    InitializeRequest:
      type: object
      required: [instanceName, username, displayName, password]
      properties:
        instanceName:
          type: string
          minLength: 1
          maxLength: 100
        username:
          type: string
          minLength: 3
          maxLength: 50
        displayName:
          type: string
        email:
          type: string
          format: email
          nullable: true
        password:
          type: string

    # ── Privacy Schemas ───────────────────────────────────────────────────────

    FortressStatus:
      type: object
      properties:
        enabled:
          type: boolean
        enabledAt:
          type: string
          format: date-time
          nullable: true
        enabledByUsername:
          type: string
          nullable: true
        verified:
          type: boolean

    SovereigntyReport:
      type: object
      properties:
        generatedAt:
          type: string
          format: date-time
        fortressStatus:
          $ref: '#/components/schemas/FortressStatus'
        outboundTrafficVerification:
          type: string
        dataInventory:
          $ref: '#/components/schemas/DataInventory'
        auditSummary:
          $ref: '#/components/schemas/AuditSummary'
        encryptionStatus:
          type: string
        telemetryStatus:
          type: string
        lastVerifiedAt:
          type: string
          format: date-time
          nullable: true

    DataInventory:
      type: object
      properties:
        conversationCount:
          type: integer
          format: int64
        messageCount:
          type: integer
          format: int64
        memoryCount:
          type: integer
          format: int64
        knowledgeDocumentCount:
          type: integer
          format: int64
        sensorCount:
          type: integer
          format: int64
        insightCount:
          type: integer
          format: int64

    AuditSummary:
      type: object
      properties:
        successCount:
          type: integer
          format: int64
        failureCount:
          type: integer
          format: int64
        deniedCount:
          type: integer
          format: int64
        windowStart:
          type: string
          format: date-time
        windowEnd:
          type: string
          format: date-time

    AuditLogDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        username:
          type: string
        action:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
          nullable: true
        httpMethod:
          type: string
        requestPath:
          type: string
        outcome:
          $ref: '#/components/schemas/AuditOutcome'
        responseStatus:
          type: integer
        durationMs:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time

    AuditOutcome:
      type: string
      enum: [SUCCESS, FAILURE, DENIED]

    ExportRequest:
      type: object
      required: [passphrase]
      properties:
        passphrase:
          type: string
          minLength: 8
          description: Passphrase for AES-256-GCM encryption of the export archive

    WipeResult:
      type: object
      properties:
        targetUserId:
          type: string
          format: uuid
        stepsCompleted:
          type: integer
        completedAt:
          type: string
          format: date-time
        success:
          type: boolean

    # ── Typed ApiResponse Wrappers ────────────────────────────────────────────
    # These provide concrete response shapes for documentation clarity.

    ApiResponse_AuthResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthResponse'

    ApiResponse_UserSummaryDtoList:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/UserSummaryDto'

    ApiResponse_UserDetailDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UserDetailDto'

    ApiResponse_ConversationDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ConversationDto'

    ApiResponse_ConversationSummaryDtoList:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ConversationSummaryDto'

    ApiResponse_MessageDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MessageDto'

    ApiResponse_MessageDtoList:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/MessageDto'

    ApiResponse_OllamaModelInfoList:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/OllamaModelInfo'

    ApiResponse_ActiveModelDto:
