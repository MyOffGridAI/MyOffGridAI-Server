          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

    post:
      tags: [Sensors]
      summary: Register a new sensor
      operationId: registerSensor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSensorRequest'
      responses:
        '200':
          description: Sensor registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SensorDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/sensors/{sensorId}:
    get:
      tags: [Sensors]
      summary: Get a single sensor by ID
      operationId: getSensor
      parameters:
        - name: sensorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sensor details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SensorDto'
        '404':
          description: Sensor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

    delete:
