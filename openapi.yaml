components:
  schemas:
    # === API RESPONSE WRAPPER ===
    ApiResponse_Void:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          nullable: true
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        totalElements:
          type: integer
          format: int64
        page:
          type: integer
        size:
          type: integer

    ApiResponse_String:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              type: string

    ApiResponse_Map:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              type: object
              additionalProperties: true

    ApiResponse_List_String:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              type: array
              items:
                type: string

    # === AUTH REQUEST DTOs ===
    RegisterRequest:
      type: object
      required: [username, displayName, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        password:
          type: string
        role:
          $ref: '#/components/schemas/Role'

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'

    # === AUTH RESPONSE DTOs ===
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          default: Bearer
        expiresIn:
          type: integer
          format: int64
        user:
          $ref: '#/components/schemas/UserSummaryDto'

    UserSummaryDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        isActive:
          type: boolean

    UserDetailDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time

    ApiResponse_AuthResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthResponse'

    ApiResponse_UserDetailDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UserDetailDto'

    ApiResponse_List_UserSummaryDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/UserSummaryDto'

    # === CHAT DTOs ===
    CreateConversationRequest:
      type: object
      properties:
        title:
          type: string

    BranchConversationRequest:
      type: object
      properties:
        title:
          type: string

    RenameConversationRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 32000
        stream:
          type: boolean
          default: false

    EditMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 32000

    ConversationDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        isArchived:
          type: boolean
        messageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConversationSummaryDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        isArchived:
          type: boolean
        messageCount:
          type: integer
        updatedAt:
          type: string
          format: date-time
        lastMessagePreview:
          type: string

    MessageDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/MessageRole'
        content:
          type: string
        tokenCount:
          type: integer
        hasRagContext:
          type: boolean
        thinkingContent:
          type: string
        tokensPerSecond:
          type: number
          format: double
        inferenceTimeSeconds:
          type: number
          format: double
        stopReason:
          type: string
        thinkingTokenCount:
          type: integer
        sourceTag:
          $ref: '#/components/schemas/SourceTag'
        judgeScore:
          type: number
          format: double
        judgeReason:
          type: string
        createdAt:
          type: string
          format: date-time

    ApiResponse_ConversationDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ConversationDto'

    ApiResponse_List_ConversationSummaryDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ConversationSummaryDto'

    ApiResponse_MessageDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MessageDto'

    ApiResponse_List_MessageDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/MessageDto'

    # === MODELS DTOs ===
    OllamaModelInfo:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
          format: int64
        modifiedAt:
          type: string
          format: date-time

    ActiveModelDto:
      type: object
      properties:
        modelName:
          type: string
        embedModelName:
          type: string

    OllamaHealthDto:
      type: object
      properties:
        available:
          type: boolean
        activeModel:
          type: string
        embedModelName:
          type: string
        responseTimeMs:
          type: integer
          format: int64

    SetActiveModelRequest:
      type: object
      required: [filename]
      properties:
        filename:
          type: string

    LlamaServerStatusDto:
      type: object
      properties:
        status:
          type: string
          description: "STOPPED, STARTING, RUNNING, or ERROR"
        activeModelPath:
          type: string
        port:
          type: integer
        modelsDir:
          type: string
        errorMessage:
          type: string
        modelLoaded:
          type: boolean

    NativeLlamaStatusDto:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/NativeLlamaStatus'
        activeModel:
          type: string
        errorMessage:
          type: string
        memoryUsageMb:
          type: integer
          format: int64

    ApiResponse_List_OllamaModelInfo:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/OllamaModelInfo'

    ApiResponse_ActiveModelDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ActiveModelDto'

    ApiResponse_OllamaHealthDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/OllamaHealthDto'

    ApiResponse_LlamaServerStatusDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/LlamaServerStatusDto'

    # === JUDGE DTOs ===
    JudgeStatusDto:
      type: object
      properties:
        enabled:
          type: boolean
        processRunning:
          type: boolean
        judgeModelFilename:
          type: string
        port:
          type: integer
        scoreThreshold:
          type: number
          format: double

    JudgeTestRequest:
      type: object
      required: [query, response]
      properties:
        query:
          type: string
        response:
          type: string

    JudgeTestResultDto:
      type: object
      properties:
        score:
          type: number
          format: double
        reason:
          type: string
        needsCloud:
          type: boolean
        judgeAvailable:
          type: boolean
        error:
          type: string

    ApiResponse_JudgeStatusDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/JudgeStatusDto'

    ApiResponse_JudgeTestResultDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponse_Void'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/JudgeTestResultDto'

    # === ENRICHMENT DTOs ===
    FetchUrlRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
        summarizeWithClaude:
          type: boolean
          default: false

    SearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        storeTopN:
          type: integer
          minimum: 0
          maximum: 10
          default: 0
        summarizeWithClaude:
          type: boolean
          default: false

    SearchResultDto:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
        description:
          type: string
        publishedDate:
          type: string

    SearchEnrichmentResultDto:
      type: object
      properties:
        results:
          type: array
          items:
