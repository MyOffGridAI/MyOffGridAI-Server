      summary: Delete a sensor and all its readings
      operationId: deleteSensor
      parameters:
        - name: sensorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sensor deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '404':
          description: Sensor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/sensors/{sensorId}/start:
    post:
      tags: [Sensors]
      summary: Start polling for a sensor
      operationId: startSensor
      parameters:
        - name: sensorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sensor started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SensorDto'
        '404':
          description: Sensor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/sensors/{sensorId}/stop:
    post:
      tags: [Sensors]
      summary: Stop polling for a sensor
      operationId: stopSensor
      parameters:
        - name: sensorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sensor stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SensorDto'
        '404':
          description: Sensor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/sensors/{sensorId}/latest:
    get:
      tags: [Sensors]
      summary: Get the latest reading for a sensor
      operationId: getLatestReading
      parameters:
        - name: sensorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Latest reading DTO (data may be null if no readings exist)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SensorReadingDto'
        '404':
          description: Sensor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/sensors/{sensorId}/history:
    get:
      tags: [Sensors]
      summary: Get paginated reading history for a sensor
      operationId: getReadingHistory
      parameters:
        - name: sensorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: hours
          in: query
          description: Number of hours of history (max 168)
          schema:
            type: integer
            default: 24
            maximum: 168
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of reading DTOs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SensorReadingDtoList'
        '404':
          description: Sensor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/sensors/{sensorId}/thresholds:
    put:
      tags: [Sensors]
      summary: Update threshold values for a sensor
      operationId: updateThresholds
      parameters:
        - name: sensorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateThresholdsRequest'
      responses:
        '200':
          description: Thresholds updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SensorDto'
        '404':
          description: Sensor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/sensors/test:
    post:
      tags: [Sensors]
      summary: Test a serial port connection
      operationId: testConnection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestSensorRequest'
      responses:
        '200':
          description: Test result with sample data if available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SensorTestResult'

  /api/sensors/ports:
    get:
      tags: [Sensors]
      summary: List all available serial ports on the device
      operationId: listAvailablePorts
      responses:
        '200':
          description: List of port path strings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_StringList'

  /api/sensors/{sensorId}/stream:
    get:
      tags: [Sensors]
      summary: Open an SSE stream for live sensor readings
      operationId: streamSensor
      parameters:
        - name: sensorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSE stream of SensorReadingDto events
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream broadcasting SensorReadingDto in real-time
        '404':
          description: Sensor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  # ═══════════════════════════════════════════════════════════════════════════
