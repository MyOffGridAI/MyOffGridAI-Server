openapi: 3.0.3
info:
  title: MyOffGridAI Server API
  version: 1.0.0
  description: >
    Comprehensive REST API for the MyOffGridAI Server — a privacy-first, offline-capable
    personal AI assistant built for off-grid living. This specification covers all 8 phases
    of the backend: Phase 1 (Auth & Users), Phase 2 (AI Conversations), Phase 3 (Memory),
    Phase 4 (Knowledge Vault), Phase 5 (Skills & Automation), Phase 6 (Sensor Integration),
    Phase 7 (Proactive Engine), and Phase 8 (Privacy & Fortress). All endpoints return
    responses wrapped in a standard ApiResponse envelope. Authentication uses JWT Bearer tokens.
  contact:
    name: MyOffGridAI
  license:
    name: Proprietary

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Auth
    description: Authentication operations — register, login, refresh, logout
  - name: Users
    description: User management — CRUD, deactivation, role management
  - name: Chat
    description: AI conversation and message management with streaming support
  - name: Models
    description: Ollama model listing, health, and active model configuration
  - name: Memory
    description: User memory management — CRUD, search, tagging, export
  - name: Knowledge
    description: Knowledge Vault — document upload, search, and management
  - name: Skills
    description: Skill management, execution, and execution history
  - name: Inventory
    description: Inventory item management for off-grid supplies
  - name: Sensors
    description: Sensor registration, readings, thresholds, and live streaming
  - name: Insights
    description: Proactive AI-generated insights
  - name: Notifications
    description: Notification management and real-time streaming
  - name: System
    description: System status and first-boot initialization
  - name: Privacy
    description: Fortress mode, audit logs, sovereignty reports, data export, and wipe

security:
  - BearerAuth: []

paths:
  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 1 — Auth
  # ═══════════════════════════════════════════════════════════════════════════

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user account
      description: >
        Public endpoint — allowed when no OWNER exists or caller is OWNER/ADMIN.
        Registration logic is enforced in the service layer.
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate with username and password
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using a refresh token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AuthResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate the current access token
      operationId: logout
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer token to invalidate
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 1 — Users
  # ═══════════════════════════════════════════════════════════════════════════

  /api/users:
    get:
      tags: [Users]
      summary: List all users with pagination
      description: Restricted to OWNER and ADMIN roles.
      operationId: listUsers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of user summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_UserSummaryDtoList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'
        '403':
          description: Forbidden — requires OWNER or ADMIN role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/users/{id}:
    get:
      tags: [Users]
      summary: Get user details by ID
      description: >
        OWNER and ADMIN can view any user. MEMBER and VIEWER can only view their own profile.
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_UserDetailDto'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

    put:
      tags: [Users]
      summary: Update user profile
      description: Restricted to OWNER and ADMIN roles. Updates displayName, email, and role.
      operationId: updateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_UserDetailDto'
        '403':
          description: Forbidden — requires OWNER or ADMIN role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

    delete:
      tags: [Users]
      summary: Permanently delete a user and all associated data
      description: Restricted to OWNER role only.
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '403':
          description: Forbidden — requires OWNER role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/users/{id}/deactivate:
    put:
      tags: [Users]
      summary: Deactivate a user account
      description: Restricted to OWNER role only.
      operationId: deactivateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '403':
          description: Forbidden — requires OWNER role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 2 — Chat (AI Conversations)
  # ═══════════════════════════════════════════════════════════════════════════

  /api/chat/conversations:
    post:
      tags: [Chat]
      summary: Create a new conversation
      operationId: createConversation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ConversationDto'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

    get:
      tags: [Chat]
      summary: List conversations for the authenticated user
      operationId: listConversations
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: archived
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Paginated list of conversation summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ConversationSummaryDtoList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/chat/conversations/{conversationId}:
    get:
      tags: [Chat]
      summary: Get a conversation with its messages
      operationId: getConversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ConversationDto'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

    delete:
      tags: [Chat]
      summary: Delete a conversation and all its messages
      operationId: deleteConversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/chat/conversations/{conversationId}/archive:
    put:
      tags: [Chat]
      summary: Archive a conversation
      operationId: archiveConversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/chat/conversations/{conversationId}/messages:
    post:
      tags: [Chat]
      summary: Send a message in a conversation
      description: >
        Supports synchronous (stream=false) and streaming (stream=true) modes.
        Streaming returns SSE events with token chunks, terminating with a [DONE] event.
      operationId: sendMessage
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: >
            If stream=false, returns ApiResponse<MessageDto>.
            If stream=true, returns text/event-stream with SSE token chunks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MessageDto'
            text/event-stream:
              schema:
                type: string
                description: SSE stream of token chunks, terminated with [DONE]
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

    get:
      tags: [Chat]
      summary: List messages in a conversation
      operationId: listMessages
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MessageDtoList'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 2 — Models
  # ═══════════════════════════════════════════════════════════════════════════

  /api/models:
    get:
      tags: [Models]
      summary: List all available Ollama models
      description: Public endpoint — no authentication required.
      operationId: listModels
      security: []
      responses:
        '200':
          description: List of available models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_OllamaModelInfoList'

  /api/models/active:
    get:
      tags: [Models]
      summary: Get the currently configured active model
      description: Requires authentication.
      operationId: getActiveModel
      responses:
        '200':
          description: Active model configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ActiveModelDto'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/models/health:
    get:
      tags: [Models]
      summary: Get Ollama health status
      description: Public endpoint — no authentication required.
      operationId: getModelHealth
      security: []
      responses:
        '200':
          description: Ollama health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_OllamaHealthDto'

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 3 — Memory
  # ═══════════════════════════════════════════════════════════════════════════

  /api/memory:
    get:
      tags: [Memory]
      summary: List memories with optional filters
      operationId: listMemories
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: importance
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/MemoryImportance'
        - name: tag
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of memories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MemoryDtoList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/memory/{id}:
    get:
      tags: [Memory]
      summary: Get a specific memory by ID
      operationId: getMemory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Memory details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MemoryDto'
        '404':
          description: Memory not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

    delete:
      tags: [Memory]
      summary: Delete a memory and its associated vector document
      operationId: deleteMemory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Memory deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '404':
          description: Memory not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/memory/{id}/importance:
    put:
      tags: [Memory]
      summary: Update the importance level of a memory
      operationId: updateMemoryImportance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateImportanceRequest'
      responses:
        '200':
          description: Memory importance updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MemoryDto'
        '404':
          description: Memory not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/memory/{id}/tags:
    put:
      tags: [Memory]
      summary: Update the tags of a memory
      operationId: updateMemoryTags
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTagsRequest'
      responses:
        '200':
          description: Memory tags updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MemoryDto'
        '404':
          description: Memory not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/memory/search:
    post:
      tags: [Memory]
      summary: Search memories using vector similarity
      operationId: searchMemories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemorySearchRequest'
      responses:
        '200':
          description: List of matching memories with similarity scores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MemorySearchResultDtoList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/memory/export:
    get:
      tags: [Memory]
      summary: Export all memories for the authenticated user
      operationId: exportMemories
      responses:
        '200':
          description: All memories as JSON (no pagination)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MemoryDtoList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 4 — Knowledge Vault
  # ═══════════════════════════════════════════════════════════════════════════

  /api/knowledge:
    post:
      tags: [Knowledge]
      summary: Upload a document for ingestion into the knowledge base
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: >
                    The file to upload. Supported MIME types: application/pdf,
                    text/plain, text/markdown, text/x-markdown, image/png,
                    image/jpeg, image/tiff, image/webp
      responses:
        '201':
          description: Document uploaded, processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_KnowledgeDocumentDto'
        '400':
          description: Unsupported file type or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

    get:
      tags: [Knowledge]
      summary: List knowledge documents with pagination
      operationId: listDocuments
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of document DTOs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_KnowledgeDocumentDtoList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/knowledge/{documentId}:
    get:
      tags: [Knowledge]
      summary: Get a single knowledge document by ID
      operationId: getDocument
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_KnowledgeDocumentDto'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

    delete:
      tags: [Knowledge]
      summary: Delete a knowledge document and all associated chunks/embeddings
      operationId: deleteDocument
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/knowledge/{documentId}/display-name:
    put:
      tags: [Knowledge]
      summary: Update the display name of a knowledge document
      operationId: updateDocumentDisplayName
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDisplayNameRequest'
      responses:
        '200':
          description: Display name updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_KnowledgeDocumentDto'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/knowledge/{documentId}/retry:
    post:
      tags: [Knowledge]
      summary: Retry processing of a failed document
      operationId: retryProcessing
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document re-queued for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_KnowledgeDocumentDto'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/knowledge/search:
    post:
      tags: [Knowledge]
      summary: Perform a semantic search across the knowledge base
      operationId: searchKnowledge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeSearchRequest'
      responses:
        '200':
          description: List of search results with similarity scores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_KnowledgeSearchResultDtoList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 5 — Skills & Automation
  # ═══════════════════════════════════════════════════════════════════════════

  /api/skills:
    get:
      tags: [Skills]
      summary: List all enabled skills
      operationId: listSkills
      responses:
        '200':
          description: List of enabled skill DTOs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SkillDtoList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/skills/{skillId}:
    get:
      tags: [Skills]
      summary: Get a single skill by ID
      operationId: getSkill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Skill details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SkillDto'
        '404':
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/skills/{skillId}/toggle:
    patch:
      tags: [Skills]
      summary: Toggle a skill's enabled/disabled state
      description: Requires OWNER or ADMIN role.
      operationId: toggleSkill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Skill toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SkillDto'
        '403':
          description: Forbidden — requires OWNER or ADMIN role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'
        '404':
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/skills/execute:
    post:
      tags: [Skills]
      summary: Execute a skill with parameters
      operationId: executeSkill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillExecuteRequest'
      responses:
        '200':
          description: Skill execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SkillExecutionDto'
        '404':
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/skills/executions:
    get:
      tags: [Skills]
      summary: List execution history for the authenticated user
      operationId: listExecutions
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of execution DTOs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SkillExecutionDtoList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/skills/inventory:
