  # ════════════════════════════════════════════════════════════════════
  #  STAGE 4 — responses + securitySchemes
  # ════════════════════════════════════════════════════════════════════

  responses:

    Unauthorized:
      description: Authentication required — missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse_Void'
          example:
            success: false
            message: "Full authentication is required to access this resource"
            data: null
            timestamp: "2026-03-17T12:00:00Z"
            requestId: "abc123"

    Forbidden:
      description: Insufficient role — the authenticated user lacks the required role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse_Void'
          example:
            success: false
            message: "Access Denied"
            data: null
            timestamp: "2026-03-17T12:00:00Z"
            requestId: "abc123"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse_Void'
          example:
            success: false
            message: "Entity not found"
            data: null
            timestamp: "2026-03-17T12:00:00Z"
            requestId: "abc123"

    ValidationError:
      description: Request validation failed — invalid or missing fields
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse_Void'
          example:
            success: false
            message: "Validation failed: fieldName — must not be blank"
            data: null
            timestamp: "2026-03-17T12:00:00Z"
            requestId: "abc123"

    Conflict:
      description: Resource conflict — duplicate or already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse_Void'
          example:
            success: false
            message: "Resource already exists"
            data: null
            timestamp: "2026-03-17T12:00:00Z"
            requestId: "abc123"

    PayloadTooLarge:
      description: Upload exceeds the maximum file size limit
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse_Void'
          example:
            success: false
            message: "File size exceeds the maximum allowed upload size"
            data: null
            timestamp: "2026-03-17T12:00:00Z"
            requestId: "abc123"

    ServiceUnavailable:
      description: Downstream service is unavailable (e.g. inference engine offline)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse_Void'
          example:
            success: false
            message: "Inference service is unavailable"
            data: null
            timestamp: "2026-03-17T12:00:00Z"
            requestId: "abc123"

    BadGateway:
      description: Downstream inference error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse_Void'
          example:
            success: false
            message: "Inference error"
            data: null
            timestamp: "2026-03-17T12:00:00Z"
            requestId: "abc123"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        JWT access token obtained from POST /api/auth/login or
        POST /api/auth/register. Include in the Authorization header
        as "Bearer {token}". Tokens expire per server configuration;
        use POST /api/auth/refresh to obtain a new access token.

security:
  - bearerAuth: []
