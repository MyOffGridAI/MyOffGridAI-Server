            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameConversationRequest'
      responses:
        '200':
          description: Conversation renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ConversationDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}/messages:
    post:
      summary: Send a message (sync or SSE streaming)
      operationId: sendMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: |
            If stream=false: JSON response with assistant message.
            If stream=true: SSE stream of token chunks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MessageDto'
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      summary: List messages in a conversation
      operationId: listMessages
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_List_MessageDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}/messages/{messageId}:
    put:
      summary: Edit a user message and trigger re-inference
      operationId: editMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditMessageRequest'
      responses:
        '200':
          description: Message edited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MessageDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Delete a message and all subsequent messages
      operationId: deleteMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}/branch/{messageId}:
    post:
      summary: Branch a conversation at a specific message
      operationId: branchConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchConversationRequest'
      responses:
        '201':
          description: Branched conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ConversationDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}/messages/{messageId}/regenerate:
    post:
      summary: Regenerate last assistant message (SSE stream)
      operationId: regenerateMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSE stream of regenerated tokens
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

