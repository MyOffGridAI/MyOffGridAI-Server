servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Authentication
    description: Login, registration, token refresh, logout
  - name: Users
    description: User management (CRUD, deactivation)
  - name: Chat
    description: Conversations and messages (sync + SSE streaming)
  - name: Models
    description: Inference model listing and health
  - name: Judge
    description: AI judge model management and testing
  - name: Enrichment
    description: Web fetch, web search, and Knowledge Base ingestion
  - name: Events
    description: Scheduled event management (cron, recurring, sensor threshold)
  - name: Knowledge
    description: Knowledge Vault — upload, list, search, edit documents
  - name: Library
    description: Offline library — ZIM files, eBooks, Project Gutenberg
  - name: MCP
    description: MCP client configuration and token management
  - name: Memory
    description: User memory management and semantic search
  - name: ModelDownload
    description: HuggingFace catalog, downloads, local model management
  - name: Notifications
    description: Push notifications — device registration
  - name: Privacy
    description: Fortress mode, audit logs, sovereignty, export, wipe
  - name: Proactive
    description: Insights and notification management (SSE streaming)
  - name: Sensors
    description: Sensor CRUD, readings, thresholds, SSE streaming
  - name: Settings
    description: External API settings (Anthropic, Brave, HuggingFace, etc.)
  - name: Skills
    description: Skill management, execution, inventory
  - name: System
    description: System status, initialization, AI settings, storage, factory reset
  - name: Setup
    description: Captive portal WiFi setup (public, pre-auth)

paths:
  # ═══════════════════════════════════════════════════════════════
  # Authentication
  # ═══════════════════════════════════════════════════════════════
  /api/auth/register:
    post:
      summary: Register a new user account
      operationId: registerUser
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/auth/login:
    post:
      summary: Authenticate user with username and password
      operationId: loginUser
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/refresh:
    post:
      summary: Refresh access token using a valid refresh token
      operationId: refreshToken
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      summary: Invalidate the current access token (logout)
      operationId: logoutUser
      tags: [Authentication]
      security:
        - bearerAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer token to invalidate
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ═══════════════════════════════════════════════════════════════
  # Users
  # ═══════════════════════════════════════════════════════════════
  /api/users:
    get:
      summary: List all users with pagination (OWNER/ADMIN only)
      operationId: listUsers
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
      responses:
        '200':
          description: Paginated list of user summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_List_UserSummaryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/users/{id}:
    get:
      summary: Get user detail by ID
      operationId: getUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_UserDetailDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update a user profile (OWNER/ADMIN only)
      operationId: updateUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_UserDetailDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      summary: Delete a user permanently (OWNER only)
      operationId: deleteUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/users/{id}/deactivate:
    put:
      summary: Deactivate a user account (OWNER only)
      operationId: deactivateUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ═══════════════════════════════════════════════════════════════
  # Chat
  # ═══════════════════════════════════════════════════════════════
  /api/chat/conversations:
    post:
      summary: Create a new conversation
      operationId: createConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ConversationDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      summary: List conversations for the authenticated user
      operationId: listConversations
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: archived
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Paginated conversation summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_List_ConversationSummaryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/search:
    get:
      summary: Search conversations by title
      operationId: searchConversations
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated matching conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_List_ConversationSummaryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}:
    get:
      summary: Get a conversation with its messages
      operationId: getConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ConversationDto'
