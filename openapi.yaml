        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a conversation and all messages
      operationId: deleteConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}/archive:
    put:
      summary: Archive a conversation
      operationId: archiveConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '401':
