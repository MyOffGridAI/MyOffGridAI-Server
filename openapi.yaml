      operationId: getNotifications
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of notification DTOs (paginated when unreadOnly=false)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_NotificationDtoList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Error'

  /api/notifications/{notificationId}/read:
    put:
      tags: [Notifications]
      summary: Mark a notification as read
