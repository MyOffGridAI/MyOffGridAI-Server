openapi: 3.0.3
info:
  title: MyOffGridAI Server API
  version: 1.0.0
  description: |
    Complete API specification for MyOffGridAI Server — a privacy-first,
    offline-capable AI assistant platform for off-grid living.

    **Generated:** 2026-03-16
    **Source commit:** 0722170

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Authentication
    description: Login, registration, token refresh, logout
  - name: Users
    description: User management (CRUD, deactivate)
  - name: Chat
    description: Conversations, messages, branching, streaming
  - name: Models
    description: Inference model listing and health
  - name: Model Downloads
    description: HuggingFace catalog, download management, local models
  - name: Enrichment
    description: URL fetching, web search, Knowledge Base ingestion
  - name: Events
    description: Scheduled event management
  - name: Knowledge
    description: Knowledge Vault upload, CRUD, search, editor
  - name: Library
    description: ZIM files, eBooks, Project Gutenberg
  - name: MCP
    description: MCP token management and discovery
  - name: Memory
    description: User memory CRUD, search, export
  - name: Notifications
    description: Device registration for MQTT push
  - name: Privacy
    description: Fortress mode, audit logs, export, wipe
  - name: Proactive
    description: Insights and notification management
  - name: Sensors
    description: Sensor CRUD, readings, streaming, testing
  - name: Settings
    description: External API settings (Anthropic, Brave, HuggingFace)
  - name: Skills
    description: Skill management, execution, inventory
  - name: System
    description: System status, initialization, AI/storage settings, factory reset
  - name: Setup
    description: Captive portal WiFi setup wizard

paths:
  # ══════════════════════════════════════════════════════════════
  # AUTHENTICATION
  # ══════════════════════════════════════════════════════════════
  /api/auth/register:
    post:
      summary: Register a new user
      operationId: register
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/auth/login:
    post:
      summary: Authenticate user
      operationId: login
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/refresh:
    post:
      summary: Refresh access token
      operationId: refresh
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      summary: Logout (invalidate token)
      operationId: logout
      tags: [Authentication]
      security:
        - bearerAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'

  # ══════════════════════════════════════════════════════════════
  # USERS
  # ══════════════════════════════════════════════════════════════
  /api/users:
    get:
      summary: List users (OWNER/ADMIN)
      operationId: listUsers
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListUserSummaryDto'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/users/{id}:
    get:
      summary: Get user by ID
      operationId: getUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserDetailDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update user (OWNER/ADMIN)
      operationId: updateUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserDetailDto'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      summary: Delete user (OWNER only)
      operationId: deleteUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/users/{id}/deactivate:
    put:
      summary: Deactivate user (OWNER only)
      operationId: deactivateUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ══════════════════════════════════════════════════════════════
  # CHAT
  # ══════════════════════════════════════════════════════════════
  /api/chat/conversations:
    post:
      summary: Create conversation
      operationId: createConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'
    get:
      summary: List conversations
      operationId: listConversations
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: archived
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Paginated conversation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListConversationSummaryDto'

  /api/chat/conversations/search:
    get:
      summary: Search conversations by title
      operationId: searchConversations
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Matching conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListConversationSummaryDto'

  /api/chat/conversations/{conversationId}:
    get:
      summary: Get conversation with messages
      operationId: getConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
      responses:
        '200':
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete conversation
      operationId: deleteConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
      responses:
        '200':
          description: Conversation deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'

  /api/chat/conversations/{conversationId}/archive:
    put:
      summary: Archive conversation
      operationId: archiveConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
      responses:
        '200':
          description: Conversation archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'

  /api/chat/conversations/{conversationId}/title:
    put:
      summary: Rename conversation
      operationId: renameConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameConversationRequest'
      responses:
        '200':
          description: Conversation renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'

  /api/chat/conversations/{conversationId}/messages:
    post:
      summary: Send message (sync or SSE stream)
      operationId: sendMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: Message response (JSON or SSE stream)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMessageDto'
            text/event-stream:
              schema:
                type: string
                description: SSE stream of token chunks
    get:
      summary: List messages in conversation
      operationId: listMessages
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated message list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListMessageDto'

  /api/chat/conversations/{conversationId}/messages/{messageId}:
    put:
      summary: Edit a user message
      operationId: editMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
        - $ref: '#/components/parameters/MessageIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditMessageRequest'
      responses:
        '200':
          description: Message edited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMessageDto'
    delete:
      summary: Delete message and subsequent messages
      operationId: deleteMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
        - $ref: '#/components/parameters/MessageIdParam'
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'

  /api/chat/conversations/{conversationId}/branch/{messageId}:
    post:
      summary: Branch conversation at message
      operationId: branchConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
        - $ref: '#/components/parameters/MessageIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchConversationRequest'
      responses:
        '201':
          description: Branched conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'

  /api/chat/conversations/{conversationId}/messages/{messageId}/regenerate:
    post:
      summary: Regenerate assistant message (SSE stream)
      operationId: regenerateMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
        - $ref: '#/components/parameters/MessageIdParam'
      responses:
        '200':
          description: SSE stream of regenerated response
          content:
            text/event-stream:
              schema:
                type: string

  # ══════════════════════════════════════════════════════════════
  # MODELS (Inference)
  # ══════════════════════════════════════════════════════════════
  /api/models:
    get:
      summary: List available inference models (public)
      operationId: listModels
      tags: [Models]
      security: []
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListOllamaModelInfo'

  /api/models/active:
    get:
      summary: Get active model
      operationId: getActiveModel
      tags: [Models]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active model info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseActiveModelDto'

  /api/models/health:
    get:
      summary: Inference provider health (public)
      operationId: getModelHealth
      tags: [Models]
      security: []
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOllamaHealthDto'

  # ══════════════════════════════════════════════════════════════
  # MODEL DOWNLOADS (HuggingFace catalog + local)
  # ══════════════════════════════════════════════════════════════
  /api/models/catalog/search:
    get:
      summary: Search HuggingFace model catalog
      operationId: searchCatalog
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            default: gguf
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHfSearchResultDto'

  /api/models/catalog/{author}/{modelId}:
    get:
      summary: Get HuggingFace model details
      operationId: getModelDetails
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      parameters:
        - name: author
          in: path
          required: true
          schema:
            type: string
        - name: modelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Model details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHfModelDto'

  /api/models/catalog/{author}/{modelId}/files:
    get:
      summary: List files in HuggingFace model repo
      operationId: getModelFiles
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      parameters:
        - name: author
          in: path
          required: true
          schema:
            type: string
        - name: modelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListHfModelFileDto'

  /api/models/download:
    post:
      summary: Start model download (OWNER)
      operationId: startDownload
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartDownloadRequest'
      responses:
        '200':
          description: Download started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDownloadStartedDto'
    get:
      summary: List all downloads (OWNER)
      operationId: getAllDownloads
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Download list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListDownloadProgress'

  /api/models/download/{downloadId}/progress:
    get:
      summary: Stream download progress (SSE, OWNER)
      operationId: getDownloadProgress
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      parameters:
        - name: downloadId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE progress stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/models/download/{downloadId}:
    delete:
      summary: Cancel download (OWNER)
      operationId: cancelDownload
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      parameters:
        - name: downloadId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Download cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'

  /api/models/local:
    get:
      summary: List local model files
      operationId: listLocalModels
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Local models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListLocalModelFileDto'

  /api/models/local/{filename}:
    delete:
      summary: Delete local model file (OWNER)
      operationId: deleteLocalModel
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Model deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'

  # ══════════════════════════════════════════════════════════════
  # ENRICHMENT
  # ══════════════════════════════════════════════════════════════
  /api/enrichment/fetch-url:
    post:
      summary: Fetch URL content into Knowledge Base
      operationId: fetchUrl
      tags: [Enrichment]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FetchUrlRequest'
      responses:
        '200':
          description: URL fetched and stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseKnowledgeDocumentDto'

  /api/enrichment/search:
    post:
      summary: Web search with optional KB storage
      operationId: enrichmentSearch
      tags: [Enrichment]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSearchEnrichmentResultDto'

  /api/enrichment/status:
    get:
      summary: Enrichment subsystem status
      operationId: getEnrichmentStatus
      tags: [Enrichment]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Enrichment status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnrichmentStatusDto'

  # ══════════════════════════════════════════════════════════════
  # EVENTS
  # ══════════════════════════════════════════════════════════════
  /api/events:
    get:
      summary: List scheduled events
      operationId: listEvents
      tags: [Events]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListScheduledEventDto'
    post:
      summary: Create event
      operationId: createEvent
      tags: [Events]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
      responses:
        '200':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseScheduledEventDto'

  /api/events/{eventId}:
    get:
      summary: Get event by ID
      operationId: getEvent
      tags: [Events]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventIdParam'
      responses:
        '200':
          description: Event details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseScheduledEventDto'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update event
      operationId: updateEvent
      tags: [Events]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventRequest'
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseScheduledEventDto'
    delete:
      summary: Delete event
      operationId: deleteEvent
      tags: [Events]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventIdParam'
      responses:
        '200':
          description: Event deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'

  /api/events/{eventId}/toggle:
    put:
      summary: Toggle event enabled/disabled
      operationId: toggleEvent
      tags: [Events]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventIdParam'
      responses:
        '200':
          description: Event toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseScheduledEventDto'

  # ══════════════════════════════════════════════════════════════
  # KNOWLEDGE
  # ══════════════════════════════════════════════════════════════
  /api/knowledge:
    post:
      summary: Upload document (multipart)
      operationId: uploadDocument
      tags: [Knowledge]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseKnowledgeDocumentDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
    get:
      summary: List knowledge documents
      operationId: listDocuments
      tags: [Knowledge]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated documents
          content:
            application/json:
              schema:
