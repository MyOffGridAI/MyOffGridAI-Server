components:
  # ══════════════════════════════════════════════════════════════════════
  # PARAMETERS
  # ══════════════════════════════════════════════════════════════════════
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    UuidIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ConversationIdParam:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MessageIdParam:
      name: messageId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SensorIdParam:
      name: sensorId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # ══════════════════════════════════════════════════════════════════════
  # SECURITY SCHEMES
  # ══════════════════════════════════════════════════════════════════════
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /api/auth/login or /api/system/initialize

  # ══════════════════════════════════════════════════════════════════════
  # RESPONSES
  # ══════════════════════════════════════════════════════════════════════
  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseVoid'
          example:
            success: false
            message: Unauthorized
            timestamp: "2026-03-17T12:00:00Z"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseVoid'
          example:
            success: false
            message: Access denied
            timestamp: "2026-03-17T12:00:00Z"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseVoid'
          example:
            success: false
            message: Resource not found
            timestamp: "2026-03-17T12:00:00Z"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseVoid'
          example:
            success: false
            message: "Validation failed: field: must not be blank"
            timestamp: "2026-03-17T12:00:00Z"
    Conflict:
      description: Resource conflict (e.g., duplicate username/email)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseVoid'
          example:
            success: false
            message: Username already exists
            timestamp: "2026-03-17T12:00:00Z"
    PayloadTooLarge:
      description: File upload exceeds maximum size (100 MB)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseVoid'
          example:
            success: false
            message: "File too large. Maximum upload size is 100 MB"
            timestamp: "2026-03-17T12:00:00Z"

  # ══════════════════════════════════════════════════════════════════════
  # SCHEMAS
  # ══════════════════════════════════════════════════════════════════════
  schemas:
    # ── API Response Envelope ────────────────────────────────────────
    ApiResponseVoid:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseObject:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
        timestamp:
          type: string
          format: date-time

    ApiResponseString:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: string
        timestamp:
          type: string
          format: date-time

    ApiResponseMapStringLong:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            unreadCount:
              type: integer
              format: int64
        timestamp:
          type: string
          format: date-time

    ApiResponseListString:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            type: string
        timestamp:
          type: string
          format: date-time

    # ── Generic paginated wrapper properties ─────────────────────────
    # Pagination fields are included in all ApiResponse* list types:
    # totalElements (int64), page (int), size (int)

    # ── Auth DTOs ────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [username, password, displayName]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        password:
          type: string
        role:
          $ref: '#/components/schemas/Role'

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          default: Bearer
        expiresIn:
          type: integer
          format: int64
          description: Token expiration in milliseconds
        user:
          $ref: '#/components/schemas/UserSummaryDto'

    UserSummaryDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        isActive:
          type: boolean

    UserDetailDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time

    # ── Chat DTOs ────────────────────────────────────────────────────
    CreateConversationRequest:
      type: object
      properties:
        title:
          type: string

    RenameConversationRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 100

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          maxLength: 32000
        stream:
          type: boolean
          default: true

    EditMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          maxLength: 32000

    BranchConversationRequest:
      type: object
      properties:
        title:
          type: string

    ConversationDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        isArchived:
          type: boolean
        messageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConversationSummaryDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        isArchived:
          type: boolean
        messageCount:
          type: integer
        updatedAt:
          type: string
          format: date-time
        lastMessagePreview:
          type: string

    MessageDto:
      type: object
      properties:
