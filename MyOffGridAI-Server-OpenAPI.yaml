# ════════════════════════════════════════════════════════════════
# COMPONENTS
# ════════════════════════════════════════════════════════════════
components:

  # ── Reusable Parameters ────────────────────────────────────────
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    ConversationIdParam:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MessageIdParam:
      name: messageId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DocumentIdParam:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EventIdParam:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SensorIdParam:
      name: sensorId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # ── Reusable Responses ─────────────────────────────────────────
  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseVoid'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseVoid'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseVoid'
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseVoid'
    Conflict:
      description: Resource conflict (duplicate)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseVoid'
    PayloadTooLarge:
      description: File too large (max 100 MB)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseVoid'

  # ── Security Schemes ───────────────────────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT obtained from /api/auth/login or /api/system/initialize

  # ── Schemas ────────────────────────────────────────────────────
  schemas:

    # ── API Response Envelope ──────────────────────────────────
    ApiResponseVoid:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data: {}
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        totalElements:
          type: integer
          format: int64
        page:
          type: integer
        size:
          type: integer

    # Typed wrappers (same envelope, data type varies)
    ApiResponseAuthResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseVoid'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthResponse'
    ApiResponseUserDetailDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponseVoid'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UserDetailDto'
    ApiResponseListUserSummaryDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponseVoid'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/UserSummaryDto'
    ApiResponseConversationDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponseVoid'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ConversationDto'
    ApiResponseListConversationSummaryDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponseVoid'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ConversationSummaryDto'
    ApiResponseMessageDto:
      allOf:
        - $ref: '#/components/schemas/ApiResponseVoid'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MessageDto'
    ApiResponseListMessageDto:
      allOf:
