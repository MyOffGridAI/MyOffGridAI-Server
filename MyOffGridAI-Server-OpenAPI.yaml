        message: *id002
        timestamp: *id003
        requestId: *id004
    ApiResponse_ZimFileDto:
      type: object
      properties:
        success: *id001
        message: *id002
        timestamp: *id003
        requestId: *id004
        data:
          $ref: '#/components/schemas/ZimFileDto'
    CreateMcpTokenRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          maxLength: 100
    FactoryResetRequest:
      type: object
      required:
      - confirmPhrase
      properties:
        confirmPhrase:
          type: string
          description: Must equal "RESET MY DEVICE"
    InitializeRequest:
      type: object
      required:
      - instanceName
      - username
      - displayName
      - password
      properties:
        instanceName:
          type: string
          minLength: 1
          maxLength: 100
        username:
          type: string
          minLength: 3
          maxLength: 50
        displayName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
    SetActiveModelRequest:
      type: object
      required:
      - filename
      properties:
        filename:
          type: string
          description: GGUF filename to load
    StorageSettingsDto:
      type: object
      properties:
        knowledgeStoragePath:
          type: string
        totalSpaceMb:
          type: integer
          format: int64
        usedSpaceMb:
          type: integer
          format: int64
        freeSpaceMb:
          type: integer
          format: int64
        maxUploadSizeMb:
          type: integer
    WifiConnectRequest:
      type: object
      required:
      - ssid
      properties:
        ssid:
          type: string
        password:
          type: string
    McpTokenSummaryDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        isActive:
          type: boolean
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
    McpTokenCreateResult:
      type: object
      properties:
        tokenId:
          type: string
          format: uuid
        plaintextToken:
          type: string
          description: Shown once, never retrievable again
        name:
          type: string
    SystemStatusDto:
      type: object
      properties:
        initialized:
          type: boolean
        instanceName:
          type: string
        fortressEnabled:
          type: boolean
        wifiConfigured:
          type: boolean
        serverVersion:
          type: string
        timestamp:
          type: string
          format: date-time
        inferenceProvider:
          type: string
        inferenceProviderStatus:
          type: string
        activeModelFilename:
          type: string
    LlamaServerStatusDto:
      type: object
      properties:
        status:
          type: string
          enum:
          - STOPPED
          - STARTING
          - RUNNING
          - ERROR
        activeModelPath:
          type: string
          nullable: true
        port:
          type: integer
        modelsDir:
          type: string
        errorMessage:
          type: string
          nullable: true
        modelLoaded:
          type: boolean
    WifiNetwork:
      type: object
      properties:
        ssid:
          type: string
        signalStrength:
          type: integer
          description: Signal strength in dBm
        security:
          type: string
          description: e.g. WPA2, WPA3, Open
    WifiConnectionStatus:
      type: object
      properties:
        connected:
          type: boolean
        hasInternet:
          type: boolean
    WifiConnectResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict (e.g., duplicate)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/auth/login
