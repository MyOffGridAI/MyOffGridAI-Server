      enum: [USER, ASSISTANT, SYSTEM]

    ChunkType:
      type: string
      enum: [THINKING, CONTENT, DONE]

    DocumentStatus:
      type: string
      enum: [PENDING, PROCESSING, READY, FAILED]

    EventType:
      type: string
      enum: [SCHEDULED, SENSOR_THRESHOLD, RECURRING]

    ActionType:
      type: string
      enum: [PUSH_NOTIFICATION, AI_PROMPT, AI_SUMMARY]

    ThresholdOperator:
