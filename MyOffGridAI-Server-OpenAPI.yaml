servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Authentication
    description: Login, registration, token management
  - name: Users
    description: User management endpoints
  - name: Chat
    description: AI conversation and message management
  - name: Models
    description: Ollama model management and health
  - name: Enrichment
    description: Web enrichment — URL fetching, web search
  - name: Events
    description: Scheduled event management
  - name: Knowledge
    description: Knowledge Vault document management and semantic search
  - name: Library
    description: Offline library — ZIM files, eBooks, Project Gutenberg
  - name: MCP
    description: Model Context Protocol token and discovery management
  - name: Memory
    description: User memory management and semantic search
  - name: Device Registration
    description: MQTT push notification device management
  - name: Privacy
    description: Fortress mode, audit logs, data export, sovereignty
  - name: Insights
    description: Proactive insight generation and management
  - name: Notifications
    description: Notification management and real-time streaming
  - name: Sensors
    description: Sensor management, readings, and live streaming
  - name: Settings
    description: External API settings management
  - name: Skills
    description: Skill management, execution, and inventory
  - name: System
    description: System status, initialization, AI/storage settings, factory reset
  - name: Setup
    description: Captive portal WiFi setup wizard

paths:
  # ══════════════════════════════════════════════════════════════
  #  AUTHENTICATION
  # ══════════════════════════════════════════════════════════════
  /api/auth/register:
    post:
      summary: Register new user
      operationId: register
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/auth/login:
    post:
      summary: Authenticate user
      operationId: login
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/refresh:
    post:
      summary: Refresh access token
      operationId: refresh
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      summary: Logout (invalidate token)
      operationId: logout
      tags: [Authentication]
      security:
        - bearerAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ══════════════════════════════════════════════════════════════
  #  USERS
  # ══════════════════════════════════════════════════════════════
  /api/users:
    get:
      summary: List all users (paginated)
      operationId: listUsers
      tags: [Users]
      security:
        - bearerAuth: []
      description: Restricted to OWNER and ADMIN roles.
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: Paginated list of user summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListUserSummaryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/users/{id}:
    get:
      summary: Get user by ID
      operationId: getUser
      tags: [Users]
      security:
        - bearerAuth: []
      description: OWNER/ADMIN can view any user. Others can only view their own profile.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserDetailDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: Update user profile
      operationId: updateUser
      tags: [Users]
      security:
        - bearerAuth: []
      description: Restricted to OWNER and ADMIN roles.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserDetailDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      summary: Delete user permanently
      operationId: deleteUser
      tags: [Users]
      security:
        - bearerAuth: []
      description: Restricted to OWNER role only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/users/{id}/deactivate:
    put:
      summary: Deactivate user account
      operationId: deactivateUser
      tags: [Users]
      security:
        - bearerAuth: []
      description: Restricted to OWNER role only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ══════════════════════════════════════════════════════════════
  #  CHAT
  # ══════════════════════════════════════════════════════════════
  /api/chat/conversations:
    post:
      summary: Create a new conversation
      operationId: createConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      summary: List conversations (paginated)
      operationId: listConversations
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - name: archived
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Paginated list of conversation summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListConversationSummaryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/search:
    get:
      summary: Search conversations by title
      operationId: searchConversations
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListConversationSummaryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}:
    get:
      summary: Get conversation with messages
      operationId: getConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete conversation and all messages
      operationId: deleteConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/archive:
    put:
      summary: Archive a conversation
      operationId: archiveConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/title:
    put:
      summary: Rename a conversation
      operationId: renameConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameConversationRequest'
      responses:
        '200':
          description: Conversation renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/messages:
    post:
      summary: Send a message (sync or SSE stream)
      operationId: sendMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      description: |
        If stream=false, returns JSON with assistant message.
        If stream=true, returns text/event-stream with token chunks ending with [DONE].
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: Assistant message (sync) or SSE stream
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMessageDto'
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    get:
      summary: List messages in a conversation (paginated)
      operationId: listMessages
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: Paginated messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListMessageDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

