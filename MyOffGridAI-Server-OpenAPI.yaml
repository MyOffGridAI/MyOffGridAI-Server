components:
  schemas:
    # === API RESPONSE WRAPPER ===
    ApiResponse:
      type: object
      description: Generic API response wrapper used by all endpoints
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          description: Response payload (type varies by endpoint)
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        totalElements:
          type: integer
          format: int64
          description: Total elements for paginated responses
        page:
          type: integer
          description: Current page number (0-indexed)
        size:
          type: integer
          description: Page size

    # === AUTH REQUEST DTOs ===
    RegisterRequest:
      type: object
      required:
        - username
        - displayName
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: Username (3-50 characters)
        email:
          type: string
          format: email
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        password:
          type: string
          description: Password
        role:
          $ref: '#/components/schemas/Role'

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'

    # === CHAT REQUEST DTOs ===
    CreateConversationRequest:
      type: object
      properties:
        title:
          type: string

    RenameConversationRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100

    SendMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 32000
        stream:
          type: boolean
          default: false

    EditMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 32000

    BranchConversationRequest:
      type: object
      properties:
        title:
          type: string

    SetActiveModelRequest:
      type: object
      required:
        - filename
      properties:
        filename:
          type: string

    # === JUDGE REQUEST DTOs ===
    JudgeTestRequest:
      type: object
      required:
        - query
        - response
      properties:
        query:
          type: string
        response:
          type: string

    # === ENRICHMENT REQUEST DTOs ===
    FetchUrlRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
        summarizeWithClaude:
          type: boolean
          default: false

    SearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
        storeTopN:
          type: integer
          minimum: 0
          maximum: 10
        summarizeWithClaude:
          type: boolean
          default: false

    # === EVENT REQUEST DTOs ===
    CreateEventRequest:
      type: object
      required:
        - name
        - eventType
        - actionType
        - actionPayload
      properties:
        name:
          type: string
        description:
          type: string
        eventType:
          $ref: '#/components/schemas/EventType'
        cronExpression:
          type: string
        recurringIntervalMinutes:
          type: integer
        sensorId:
          type: string
          format: uuid
        thresholdOperator:
          $ref: '#/components/schemas/ThresholdOperator'
        thresholdValue:
          type: number
          format: double
        actionType:
          $ref: '#/components/schemas/ActionType'
        actionPayload:
          type: string
        isEnabled:
          type: boolean

    UpdateEventRequest:
      type: object
      required:
        - name
        - eventType
        - actionType
        - actionPayload
      properties:
        name:
          type: string
        description:
          type: string
        eventType:
          $ref: '#/components/schemas/EventType'
        cronExpression:
          type: string
        recurringIntervalMinutes:
          type: integer
        sensorId:
          type: string
          format: uuid
        thresholdOperator:
          $ref: '#/components/schemas/ThresholdOperator'
        thresholdValue:
          type: number
          format: double
        actionType:
          $ref: '#/components/schemas/ActionType'
        actionPayload:
          type: string
