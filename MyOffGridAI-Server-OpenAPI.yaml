  # ══════════════════════════════════════════════════════════════════════
  # CHAT
  # ══════════════════════════════════════════════════════════════════════
  /api/chat/conversations:
    post:
      summary: Create a new conversation
      operationId: createConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '200':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      summary: List conversations with pagination
      operationId: listConversations
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: archived
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Paginated list of conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListConversationSummaryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/search:
    get:
      summary: Search conversations by query
      operationId: searchConversations
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListConversationSummaryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}:
    get:
      summary: Get conversation by ID
      operationId: getConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
      responses:
        '200':
          description: Conversation details
          content:
            application/json:
