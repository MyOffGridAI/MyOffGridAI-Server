      summary: Test judge scoring on a query/response pair
      operationId: testJudge
      tags: [Judge]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JudgeTestRequest'
      responses:
        '200':
          description: Judge test result
