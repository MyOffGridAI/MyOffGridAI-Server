    # ══════════════════════════════════════════════════════════════
    #  ENUMS
    # ══════════════════════════════════════════════════════════════
    Role:
      type: string
      enum: [ROLE_OWNER, ROLE_ADMIN, ROLE_MEMBER, ROLE_VIEWER, ROLE_CHILD]
    MessageRole:
      type: string
      enum: [USER, ASSISTANT, SYSTEM]
    DocumentStatus:
      type: string
      enum: [PENDING, PROCESSING, READY, FAILED]
    EventType:
      type: string
      enum: [SCHEDULED, SENSOR_THRESHOLD, RECURRING]
    ActionType:
      type: string
      enum: [PUSH_NOTIFICATION, AI_PROMPT, AI_SUMMARY]
    ThresholdOperator:
      type: string
      enum: [ABOVE, BELOW, EQUALS]
    EbookFormat:
      type: string
      enum: [EPUB, PDF, MOBI, AZW, TXT, HTML]
    MemoryImportance:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]
    AuditOutcome:
      type: string
      enum: [SUCCESS, FAILURE, DENIED]
    InsightCategory:
      type: string
      enum: [HOMESTEAD, HEALTH, RESOURCE, GENERAL]
    NotificationType:
      type: string
      enum: [SENSOR_ALERT, SYSTEM_HEALTH, INSIGHT_READY, MODEL_UPDATE, GENERAL]
    SensorType:
      type: string
      enum: [TEMPERATURE, HUMIDITY, SOIL_MOISTURE, POWER, VOLTAGE, CUSTOM]
    DataFormat:
      type: string
      enum: [CSV_LINE, JSON_LINE]
    ExecutionStatus:
      type: string
      enum: [RUNNING, COMPLETED, FAILED]
    InventoryCategory:
      type: string
      enum: [FOOD, TOOLS, MEDICAL, SUPPLIES, SEEDS, EQUIPMENT, OTHER]
    SkillCategory:
      type: string
      enum: [HOMESTEAD, RESOURCE, PLANNING, KNOWLEDGE, WEATHER, CUSTOM]

    # ── Error Response ────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }
        timestamp: { type: string, format: date-time }
        requestId: { type: string }

  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict (e.g., duplicate or already exists)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PayloadTooLarge:
      description: File too large (max 100 MB)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/auth/login or /api/system/initialize
