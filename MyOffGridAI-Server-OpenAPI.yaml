          $ref: '#/components/schemas/MessageRole'
        content:
          type: string
        tokenCount:
          type: integer
        hasRagContext:
          type: boolean
        thinkingContent:
          type: string
        tokensPerSecond:
          type: number
          format: double
        inferenceTimeSeconds:
          type: number
          format: double
        stopReason:
          type: string
        thinkingTokenCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ActiveModelDto:
      type: object
      properties:
        modelName:
          type: string
        embedModelName:
          type: string

    SetActiveModelRequest:
      type: object
      required: [filename]
