components:
  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data: {}
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        totalElements:
          type: integer
          format: int64
        page:
          type: integer
        size:
          type: integer
    ApiResponseNull:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
    Role:
      type: string
      enum:
      - ROLE_OWNER
      - ROLE_ADMIN
      - ROLE_MEMBER
      - ROLE_VIEWER
      - ROLE_CHILD
    MessageRole:
      type: string
      enum:
      - USER
      - ASSISTANT
      - SYSTEM
    SourceTag:
      type: string
      enum:
      - LOCAL
      - ENHANCED
    DocumentStatus:
      type: string
      enum:
      - PENDING
      - PROCESSING
      - READY
      - FAILED
    EbookFormat:
      type: string
      enum:
      - EPUB
      - PDF
      - MOBI
      - AZW
      - TXT
      - HTML
    KiwixDownloadState:
      type: string
      enum:
      - QUEUED
      - DOWNLOADING
      - COMPLETE
      - FAILED
      - CANCELLED
    EventType:
      type: string
      enum:
      - SCHEDULED
      - SENSOR_THRESHOLD
      - RECURRING
    ActionType:
      type: string
      enum:
      - PUSH_NOTIFICATION
      - AI_PROMPT
      - AI_SUMMARY
    ThresholdOperator:
      type: string
      enum:
      - ABOVE
      - BELOW
      - EQUALS
    MemoryImportance:
      type: string
      enum:
      - LOW
      - MEDIUM
      - HIGH
      - CRITICAL
    SensorType:
      type: string
      enum:
      - TEMPERATURE
      - HUMIDITY
      - SOIL_MOISTURE
      - POWER
      - VOLTAGE
      - CUSTOM
    DataFormat:
      type: string
      enum:
      - CSV_LINE
      - JSON_LINE
    InsightCategory:
      type: string
      enum:
      - HOMESTEAD
      - HEALTH
      - RESOURCE
      - GENERAL
    NotificationType:
      type: string
      enum:
      - SENSOR_ALERT
      - SYSTEM_HEALTH
      - INSIGHT_READY
      - MODEL_UPDATE
      - GENERAL
    NotificationSeverity:
      type: string
      enum:
      - INFO
      - WARNING
      - CRITICAL
    AuditOutcome:
      type: string
      enum:
      - SUCCESS
      - FAILURE
      - DENIED
    FrontierProvider:
      type: string
      enum:
      - CLAUDE
      - GROK
      - OPENAI
    SkillCategory:
      type: string
      enum:
      - HOMESTEAD
      - RESOURCE
      - PLANNING
      - KNOWLEDGE
      - WEATHER
      - CUSTOM
    ExecutionStatus:
      type: string
      enum:
      - RUNNING
      - COMPLETED
      - FAILED
    InventoryCategory:
      type: string
      enum:
      - FOOD
      - TOOLS
      - MEDICAL
      - SUPPLIES
      - SEEDS
      - EQUIPMENT
      - OTHER
    QuantizationType:
      type: string
      enum:
      - IQ1_S
      - IQ2_XS
      - Q2_K
      - Q3_K_XS
      - Q3_K_S
      - Q3_K_M
      - Q4_K_S
      - Q4_K_M
      - Q5_K_S
      - Q5_K_M
      - Q6_K
      - Q8_0
      - F16
      - BF16
      - F32
    DownloadStatus:
      type: string
      enum:
      - QUEUED
      - DOWNLOADING
      - PAUSED
      - COMPLETED
      - FAILED
      - CANCELLED
    MemoryDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        importance:
          $ref: '#/components/schemas/MemoryImportance'
        tags:
          type: string
        sourceConversationId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastAccessedAt:
          type: string
          format: date-time
        accessCount:
          type: integer
    UpdateImportanceRequest:
      type: object
      required:
      - importance
      properties:
        importance:
          $ref: '#/components/schemas/MemoryImportance'
    UpdateTagsRequest:
      type: object
      properties:
        tags:
          type: string
    MemorySearchRequest:
      type: object
      required:
      - query
      properties:
        query:
          type: string
        topK:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
    MemorySearchResultDto:
      type: object
      properties:
        memory:
          $ref: '#/components/schemas/MemoryDto'
        similarityScore:
          type: number
          format: float
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
    SensorDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: '#/components/schemas/SensorType'
        portPath:
          type: string
        baudRate:
          type: integer
        dataFormat:
          $ref: '#/components/schemas/DataFormat'
        valueField:
          type: string
        unit:
          type: string
        isActive:
          type: boolean
        pollIntervalSeconds:
          type: integer
        lowThreshold:
          type: number
          format: double
        highThreshold:
          type: number
          format: double
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SensorReadingDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sensorId:
          type: string
          format: uuid
        value:
          type: number
          format: double
        rawData:
          type: string
        recordedAt:
          type: string
          format: date-time
    CreateSensorRequest:
      type: object
      required:
      - name
      - type
      - portPath
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/SensorType'
        portPath:
          type: string
        baudRate:
          type: integer
        dataFormat:
          $ref: '#/components/schemas/DataFormat'
