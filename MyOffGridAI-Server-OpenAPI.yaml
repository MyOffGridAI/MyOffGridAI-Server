  # ══════════════════════════════════════════════════════════════
  /api/knowledge:
    post:
      summary: Upload a document for ingestion
      operationId: uploadDocument
      tags: [Knowledge]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Document uploaded, processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseKnowledgeDocumentDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'

    get:
      summary: List knowledge documents (paginated)
      operationId: listDocuments
      tags: [Knowledge]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: Paginated documents
          content:
            application/json:
              schema:
