  /api/models/download/{downloadId}/progress:
    get:
      summary: Stream download progress (SSE)
      operationId: streamDownloadProgress
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      parameters:
        - name: downloadId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE event stream with download progress
          content:
            text/event-stream:
              schema:
                type: string
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/models/download/{downloadId}:
    delete:
      summary: Cancel download (OWNER only)
      operationId: cancelDownload
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      parameters:
        - name: downloadId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Download cancelled
          content:
            application/json:
              schema:
