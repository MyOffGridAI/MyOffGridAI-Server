openapi: 3.0.3
info:
  title: MyOffGridAI-Server API
  version: 1.0.0
  description: |
    Complete OpenAPI specification for the MyOffGridAI-Server — an off-grid, privacy-first
    personal AI assistant with local LLM inference, knowledge management, sensor monitoring,
    proactive insights, and skill automation.

    **Generation timestamp:** 2026-03-18T18:24:15Z
    **Source commit:** 9f2d12661435204da790acb1d402d4ac06211709

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Authentication
    description: Login, registration, token refresh, logout
  - name: Users
    description: User management (CRUD, deactivation)
  - name: Chat
    description: Conversations and messages with local LLM
  - name: Models
    description: Model info, health, active model
  - name: Model Downloads
    description: HuggingFace catalog search, model downloads, local model management
  - name: Judge
    description: AI response quality judge (start/stop/test)
  - name: Enrichment
    description: Web search and URL fetch enrichment
  - name: Events
    description: Scheduled, recurring, and sensor-threshold events
  - name: Knowledge
    description: Knowledge base document upload, search, CRUD
  - name: Library
    description: Ebook and ZIM file management, Gutenberg, Kiwix
  - name: MCP Discovery
    description: MCP protocol discovery and config
  - name: MCP Tokens
    description: MCP API token management
  - name: Memory
    description: User memory storage, search, export
  - name: Device Registration
    description: Push notification device registration
  - name: Privacy
    description: Fortress mode, audit logs, data export, data wipe
  - name: Insights
    description: Proactive AI-generated insights
  - name: Notifications
    description: System and proactive notifications
  - name: Sensors
    description: Sensor CRUD, readings, streaming, thresholds
  - name: External API Settings
    description: External API key and provider configuration
  - name: Skills
    description: Skill listing, execution, inventory management
  - name: System
    description: System status, initialization, AI/storage settings, factory reset
  - name: Setup
    description: Captive portal WiFi setup wizard

paths:
  /api/auth/register:
    post:
      summary: Register new user
      operationId: registerUser
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/auth/login:
    post:
      summary: Authenticate user
      operationId: loginUser
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/refresh:
    post:
      summary: Refresh access token
      operationId: refreshToken
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      summary: Logout and invalidate token
      operationId: logoutUser
      tags: [Authentication]
      security:
        - bearerAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/users:
    get:
      summary: List all users (paginated)
      operationId: listUsers
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListUserSummaryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/users/{id}:
    get:
      summary: Get user by ID
      operationId: getUserById
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserDetailDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update user
      operationId: updateUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserDetailDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      summary: Delete user (OWNER only)
      operationId: deleteUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/users/{id}/deactivate:
    put:
      summary: Deactivate user (OWNER only)
      operationId: deactivateUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/chat/conversations:
    post:
      summary: Create new conversation
      operationId: createConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '200':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      summary: List conversations (paginated)
      operationId: listConversations
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: archived
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Conversation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListConversationSummaryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/search:
    get:
      summary: Search conversations
      operationId: searchConversations
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListConversationSummaryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}:
    get:
      summary: Get conversation by ID
      operationId: getConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete conversation
      operationId: deleteConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/archive:
    put:
      summary: Archive conversation
      operationId: archiveConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}/title:
    put:
      summary: Rename conversation
      operationId: renameConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameConversationRequest'
      responses:
        '200':
          description: Conversation renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}/messages:
    post:
      summary: Send message (supports SSE streaming)
      operationId: sendMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: |
            If stream=true, returns SSE event stream (text/event-stream).
            If stream=false, returns JSON response.
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE events with ChunkType-typed data
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMessageDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      summary: Get messages in conversation (paginated)
      operationId: getMessages
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Message list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListMessageDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}/messages/{messageId}:
    put:
      summary: Edit message content
      operationId: editMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditMessageRequest'
      responses:
        '200':
          description: Message edited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMessageDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete message
      operationId: deleteMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}/branch/{messageId}:
    post:
      summary: Branch conversation from a message
      operationId: branchConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchConversationRequest'
      responses:
        '200':
          description: Branched conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}/messages/{messageId}/regenerate:
    post:
      summary: Regenerate AI response (SSE stream)
      operationId: regenerateMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSE event stream with regenerated response
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/models:
    get:
      summary: List available Ollama models
      operationId: listModels
      tags: [Models]
      security: []
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListOllamaModelInfo'

  /api/models/active:
    get:
      summary: Get currently active model
      operationId: getActiveModel
      tags: [Models]
      security: []
      responses:
        '200':
          description: Active model info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseActiveModelDto'

  /api/models/health:
    get:
      summary: Check Ollama health status
      operationId: getOllamaHealth
      tags: [Models]
      security: []
      responses:
        '200':
          description: Ollama health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOllamaHealthDto'

  /api/ai/judge/status:
    get:
      summary: Get judge status
      operationId: getJudgeStatus
      tags: [Judge]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Judge status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseJudgeStatusDto'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/ai/judge/start:
    post:
      summary: Start judge process (ADMIN/OWNER)
      operationId: startJudge
      tags: [Judge]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Judge started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseJudgeStatusDto'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/ai/judge/stop:
    post:
      summary: Stop judge process (ADMIN/OWNER)
      operationId: stopJudge
