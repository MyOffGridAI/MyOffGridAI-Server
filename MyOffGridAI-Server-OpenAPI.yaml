openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/users/{id}:
    get:
      tags:
      - user-controller
      operationId: getUser
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseUserDetailDto'
    put:
      tags:
      - user-controller
      operationId: updateUser
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseUserDetailDto'
    delete:
      tags:
      - user-controller
      operationId: deleteUser
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
  /api/users/{id}/deactivate:
    put:
      tags:
      - user-controller
      operationId: deactivateUser
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
  /api/chat/conversations/{conversationId}/archive:
    put:
      tags:
      - chat-controller
      operationId: archiveConversation
      parameters:
      - name: conversationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
  /api/chat/conversations:
    get:
      tags:
      - chat-controller
      operationId: listConversations
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      - name: archived
        in: query
        required: false
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseListConversationSummaryDto'
    post:
      tags:
      - chat-controller
      operationId: createConversation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'
  /api/chat/conversations/{conversationId}/messages:
    get:
      tags:
      - chat-controller
      operationId: listMessages
      parameters:
      - name: conversationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseListMessageDto'
    post:
      tags:
      - chat-controller
      operationId: sendMessage
      parameters:
      - name: conversationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /api/auth/register:
    post:
      tags:
      - auth-controller
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'
  /api/auth/refresh:
    post:
      tags:
      - auth-controller
      operationId: refresh
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'
  /api/auth/logout:
    post:
      tags:
      - auth-controller
      operationId: logout
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
  /api/auth/login:
    post:
      tags:
      - auth-controller
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'
  /api/users:
    get:
      tags:
      - user-controller
      operationId: listUsers
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseListUserSummaryDto'
  /api/models:
    get:
      tags:
      - model-controller
      operationId: listModels
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseListOllamaModelInfo'
  /api/models/health:
    get:
      tags:
      - model-controller
      operationId: getHealth
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseOllamaHealthDto'
  /api/models/active:
    get:
      tags:
      - model-controller
      operationId: getActiveModel
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseActiveModelDto'
  /api/chat/conversations/{conversationId}:
    get:
      tags:
      - chat-controller
      operationId: getConversation
      parameters:
      - name: conversationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'
    delete:
      tags:
      - chat-controller
      operationId: deleteConversation
      parameters:
      - name: conversationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
components:
  schemas:
    UpdateUserRequest:
      type: object
      properties:
        displayName:
          type: string
          maxLength: 100
          minLength: 1
        email:
          type: string
        role:
          type: string
          enum:
          - ROLE_OWNER
          - ROLE_ADMIN
          - ROLE_MEMBER
          - ROLE_VIEWER
          - ROLE_CHILD
    ApiResponseUserDetailDto:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/UserDetailDto'
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        totalElements:
          type: integer
          format: int64
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
    UserDetailDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum:
          - ROLE_OWNER
          - ROLE_ADMIN
          - ROLE_MEMBER
          - ROLE_VIEWER
          - ROLE_CHILD
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
    ApiResponseVoid:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        totalElements:
          type: integer
          format: int64
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
    CreateConversationRequest:
      type: object
      properties:
        title:
          type: string
    ApiResponseConversationDto:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/ConversationDto'
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        totalElements:
          type: integer
          format: int64
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
    ConversationDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        isArchived:
          type: boolean
        messageCount:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SendMessageRequest:
      type: object
      properties:
        content:
          type: string
          maxLength: 32000
          minLength: 0
        stream:
          type: boolean
      required:
      - content
    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          maxLength: 50
          minLength: 3
        email:
          type: string
        displayName:
          type: string
          maxLength: 100
          minLength: 1
        password:
          type: string
        role:
          type: string
          enum:
          - ROLE_OWNER
          - ROLE_ADMIN
          - ROLE_MEMBER
          - ROLE_VIEWER
          - ROLE_CHILD
      required:
      - displayName
      - password
      - username
    ApiResponseAuthResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/AuthResponse'
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        totalElements:
          type: integer
          format: int64
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
          format: int64
        user:
          $ref: '#/components/schemas/UserSummaryDto'
    UserSummaryDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum:
          - ROLE_OWNER
          - ROLE_ADMIN
          - ROLE_MEMBER
          - ROLE_VIEWER
          - ROLE_CHILD
        isActive:
          type: boolean
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required:
      - refreshToken
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
      - password
      - username
    ApiResponseListUserSummaryDto:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserSummaryDto'
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        totalElements:
          type: integer
          format: int64
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
    ApiResponseListOllamaModelInfo:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/OllamaModelInfo'
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        totalElements:
          type: integer
          format: int64
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
    OllamaModelInfo:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
          format: int64
        modifiedAt:
          type: string
          format: date-time
    ApiResponseOllamaHealthDto:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/OllamaHealthDto'
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        totalElements:
          type: integer
          format: int64
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
    OllamaHealthDto:
      type: object
      properties:
        available:
          type: boolean
        activeModel:
          type: string
        embedModelName:
          type: string
        responseTimeMs:
          type: integer
          format: int64
    ActiveModelDto:
      type: object
      properties:
        modelName:
          type: string
        embedModelName:
          type: string
    ApiResponseActiveModelDto:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/ActiveModelDto'
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        totalElements:
          type: integer
          format: int64
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
    ApiResponseListConversationSummaryDto:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/ConversationSummaryDto'
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        totalElements:
          type: integer
          format: int64
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
    ConversationSummaryDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        isArchived:
          type: boolean
        messageCount:
          type: integer
          format: int32
        updatedAt:
          type: string
          format: date-time
        lastMessagePreview:
          type: string
    ApiResponseListMessageDto:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/MessageDto'
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        totalElements:
          type: integer
          format: int64
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
    MessageDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum:
          - USER
          - ASSISTANT
          - SYSTEM
        content:
          type: string
        tokenCount:
          type: integer
          format: int32
        hasRagContext:
          type: boolean
        createdAt:
          type: string
          format: date-time
