    EventType:
      type: string
      enum:
        - SCHEDULED
        - SENSOR_THRESHOLD
        - RECURRING
      description: |
        - SCHEDULED: Triggered by a cron expression
        - SENSOR_THRESHOLD: Triggered when a sensor reading crosses a threshold
        - RECURRING: Triggered at a recurring interval in minutes

