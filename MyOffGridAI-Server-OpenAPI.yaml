servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Authentication
    description: Login, registration, token management
  - name: Users
    description: User management endpoints
  - name: Chat
    description: AI conversation and message management
  - name: Models
    description: Ollama model management and health
  - name: Knowledge
    description: Knowledge vault document management and semantic search
  - name: Memory
    description: User memory management and semantic search
  - name: Events
    description: Scheduled event management
  - name: Insights
    description: Proactive AI-generated insights
  - name: Notifications
    description: Real-time notification management and SSE streaming
  - name: Sensors
    description: Sensor management, readings, and live streaming
  - name: Skills
    description: Skill management, execution, and inventory
  - name: Privacy
    description: Fortress mode, audit logs, data export and wipe
  - name: System
    description: System status, initialization, settings, and factory reset
  - name: Setup
    description: Captive portal WiFi setup endpoints

paths:
  # ══════════════════════════════════════════════════════════════
  #  AUTHENTICATION
  # ══════════════════════════════════════════════════════════════

  /api/auth/register:
    post:
      summary: Register new user
      operationId: register
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/auth/login:
    post:
      summary: Authenticate user
      operationId: login
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/refresh:
    post:
      summary: Refresh access token
      operationId: refresh
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      summary: Logout (invalidate token)
      operationId: logout
      tags: [Authentication]
      security:
        - bearerAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer token to invalidate
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ══════════════════════════════════════════════════════════════
  #  USERS
  # ══════════════════════════════════════════════════════════════

  /api/users:
    get:
      summary: List all users (OWNER/ADMIN only)
      operationId: listUsers
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: Paginated list of user summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_List_UserSummaryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/users/{id}:
    get:
      summary: Get user by ID
      operationId: getUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_UserDetailDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: Update user (OWNER/ADMIN only)
      operationId: updateUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_UserDetailDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete user permanently (OWNER only)
      operationId: deleteUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/users/{id}/deactivate:
    put:
      summary: Deactivate user (OWNER only)
      operationId: deactivateUser
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ══════════════════════════════════════════════════════════════
  #  CHAT
  # ══════════════════════════════════════════════════════════════

  /api/chat/conversations:
    post:
      summary: Create a new conversation
      operationId: createConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ConversationDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      summary: List conversations
      operationId: listConversations
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - name: archived
          in: query
          schema:
            type: boolean
            default: false
          description: Include archived conversations
      responses:
        '200':
          description: Paginated list of conversation summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_List_ConversationSummaryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/search:
    get:
      summary: Search conversations by title
      operationId: searchConversations
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: Matching conversation summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_List_ConversationSummaryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations/{conversationId}:
    get:
      summary: Get conversation with messages
      operationId: getConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/conversationId'
      responses:
        '200':
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ConversationDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete conversation and all messages
      operationId: deleteConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/conversationId'
      responses:
        '200':
          description: Conversation deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/archive:
    put:
      summary: Archive a conversation
      operationId: archiveConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/conversationId'
      responses:
        '200':
          description: Conversation archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/title:
    put:
      summary: Rename a conversation
      operationId: renameConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/conversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameConversationRequest'
      responses:
        '200':
          description: Conversation renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ConversationDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/messages:
    post:
      summary: Send a message (sync or SSE stream)
      operationId: sendMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/conversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: |
            If stream=false: JSON response with assistant message.
            If stream=true: SSE stream of token chunks, terminating with [DONE].
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MessageDto'
            text/event-stream:
              schema:
                type: string
                description: SSE stream of token chunks
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/OllamaInferenceError'
        '503':
          $ref: '#/components/responses/OllamaUnavailable'

    get:
      summary: List messages in a conversation
      operationId: listMessages
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/conversationId'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: Paginated list of messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_List_MessageDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ══════════════════════════════════════════════════════════════
  #  MODELS
  # ══════════════════════════════════════════════════════════════

  /api/models:
    get:
      summary: List available Ollama models
      operationId: listModels
      tags: [Models]
      security: []
      responses:
        '200':
          description: List of models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_List_OllamaModelInfo'

  /api/models/active:
    get:
      summary: Get active model configuration
      operationId: getActiveModel
      tags: [Models]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active model info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ActiveModelDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/models/health:
    get:
      summary: Check Ollama health status
      operationId: getOllamaHealth
      tags: [Models]
      security: []
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_OllamaHealthDto'

  # ══════════════════════════════════════════════════════════════
  #  KNOWLEDGE
  # ══════════════════════════════════════════════════════════════

  /api/knowledge:
    post:
      summary: Upload a document for ingestion
      operationId: uploadDocument
      tags: [Knowledge]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
      responses:
        '201':
          description: Document uploaded, processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_KnowledgeDocumentDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'

    get:
      summary: List knowledge documents
      operationId: listDocuments
      tags: [Knowledge]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: Paginated list of documents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_List_KnowledgeDocumentDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/knowledge/create:
    post:
      summary: Create document from rich text editor
      operationId: createDocument
      tags: [Knowledge]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '201':
          description: Document created, processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_KnowledgeDocumentDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/knowledge/search:
    post:
      summary: Semantic search across knowledge base
      operationId: searchKnowledge
      tags: [Knowledge]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeSearchRequest'
      responses:
        '200':
          description: Search results with similarity scores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_List_KnowledgeSearchResultDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/knowledge/{documentId}:
    get:
      summary: Get document by ID
      operationId: getDocument
      tags: [Knowledge]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/documentId'
      responses:
        '200':
          description: Document details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_KnowledgeDocumentDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete document and all chunks/embeddings
      operationId: deleteDocument
      tags: [Knowledge]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/documentId'
      responses:
        '200':
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/knowledge/{documentId}/display-name:
    put:
      summary: Update document display name
      operationId: updateDisplayName
      tags: [Knowledge]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/documentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDisplayNameRequest'
      responses:
        '200':
          description: Display name updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_KnowledgeDocumentDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/knowledge/{documentId}/retry:
    post:
      summary: Retry processing a failed document
      operationId: retryProcessing
      tags: [Knowledge]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/documentId'
      responses:
        '200':
          description: Document re-queued for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_KnowledgeDocumentDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/knowledge/{documentId}/download:
    get:
      summary: Download original document file
      operationId: downloadDocument
      tags: [Knowledge]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/documentId'
      responses:
        '200':
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/knowledge/{documentId}/content:
    get:
      summary: Get document content for viewing/editing
      operationId: getDocumentContent
      tags: [Knowledge]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/documentId'
      responses:
        '200':
          description: Document content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_DocumentContentDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: Update document content from rich text editor
      operationId: updateDocumentContent
      tags: [Knowledge]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/documentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContentRequest'
      responses:
        '200':
          description: Content updated, re-processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_KnowledgeDocumentDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ══════════════════════════════════════════════════════════════
  #  MEMORY
  # ══════════════════════════════════════════════════════════════

  /api/memory:
    get:
      summary: List memories with optional filters
      operationId: listMemories
      tags: [Memory]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - name: importance
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/MemoryImportance'
        - name: tag
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of memories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_List_MemoryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/memory/search:
    post:
      summary: Semantic search across memories
      operationId: searchMemories
      tags: [Memory]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemorySearchRequest'
      responses:
        '200':
          description: Memory search results with similarity scores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_List_MemorySearchResultDto'
