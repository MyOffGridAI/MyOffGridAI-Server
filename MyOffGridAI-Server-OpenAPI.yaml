  /api/memory/export:
    get:
      summary: Export all memories (no pagination)
      operationId: exportMemories
      tags: [Memory]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All memories as JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_List_MemoryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/memory/{id}:
    get:
      summary: Get memory by ID
      operationId: getMemory
      tags: [Memory]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Memory details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MemoryDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete memory and associated vector document
      operationId: deleteMemory
      tags: [Memory]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Memory deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/memory/{id}/importance:
    put:
      summary: Update memory importance level
      operationId: updateImportance
      tags: [Memory]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
