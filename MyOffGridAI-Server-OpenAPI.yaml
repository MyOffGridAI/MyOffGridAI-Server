# ══════════════════════════════════════════════════════════════
#  COMPONENTS
# ══════════════════════════════════════════════════════════════

components:
  parameters:
    page:
      name: page
      in: query
      description: Page number (0-indexed)
      schema:
        type: integer
        default: 0
        minimum: 0

    size:
      name: size
      in: query
      description: Page size (max 100)
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

    conversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    documentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    eventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    sensorId:
      name: sensorId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    # ── API Response Envelope ──────────────────────────────────

    ApiResponse_Void:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          nullable: true
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponse_String:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: string
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponse_Map:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponse_UnreadCount:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            unreadCount:
              type: integer
              format: int64
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    # Typed ApiResponse wrappers are referenced as ApiResponse_<Type>
    # They all share the envelope: success, message, data, timestamp, requestId
    # plus optional pagination fields: totalElements, page, size

    ApiResponse_AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/AuthResponse'
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponse_UserDetailDto:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/UserDetailDto'
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponse_List_UserSummaryDto:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserSummaryDto'
        totalElements:
          type: integer
          format: int64
        page:
          type: integer
        size:
          type: integer
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

