  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            success: false
            message: Unauthorized
            timestamp: "2024-01-15T10:30:00Z"

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            success: false
            message: Access denied
            timestamp: "2024-01-15T10:30:00Z"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            success: false
            message: Resource not found
            timestamp: "2024-01-15T10:30:00Z"

    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            success: false
            message: "name: must not be blank"
            timestamp: "2024-01-15T10:30:00Z"

    Conflict:
      description: Resource conflict (e.g., duplicate username/email)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            success: false
            message: Username already exists
            timestamp: "2024-01-15T10:30:00Z"

    PayloadTooLarge:
      description: File too large (max 100 MB)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            success: false
            message: "File too large. Maximum upload size is 100 MB"
            timestamp: "2024-01-15T10:30:00Z"

    ServiceUnavailable:
      description: Upstream service unavailable (Ollama, embedding, etc.)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            success: false
            message: Ollama service is not available
            timestamp: "2024-01-15T10:30:00Z"

    BadGateway:
      description: Upstream service error (inference failure, sensor connection)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            success: false
            message: Inference failed
            timestamp: "2024-01-15T10:30:00Z"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/auth/login or /api/auth/register
