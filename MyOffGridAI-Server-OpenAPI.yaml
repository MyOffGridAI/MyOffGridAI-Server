        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete conversation
      operationId: deleteConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
      responses:
        '200':
          description: Conversation deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/archive:
    put:
      summary: Archive conversation
      operationId: archiveConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
      responses:
        '200':
          description: Conversation archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/title:
    put:
      summary: Rename conversation
      operationId: renameConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameConversationRequest'
      responses:
        '200':
          description: Conversation renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/messages:
    post:
      summary: Send message (returns SSE stream or JSON)
      operationId: sendMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: SSE stream (when stream=true) or JSON response
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE stream of ChunkType events (THINKING, CONTENT, DONE)
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMessageDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      summary: List messages in conversation
      operationId: listMessages
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated list of messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListMessageDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/messages/{messageId}:
    put:
      summary: Edit a message
      operationId: editMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
        - $ref: '#/components/parameters/MessageIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditMessageRequest'
      responses:
        '200':
          description: Message edited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMessageDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a message
      operationId: deleteMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
        - $ref: '#/components/parameters/MessageIdParam'
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/branch/{messageId}:
    post:
      summary: Branch conversation from a message
      operationId: branchConversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
        - $ref: '#/components/parameters/MessageIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchConversationRequest'
      responses:
        '200':
          description: Branched conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseConversationDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/messages/{messageId}/regenerate:
    post:
      summary: Regenerate assistant message (returns SSE stream or JSON)
      operationId: regenerateMessage
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdParam'
        - $ref: '#/components/parameters/MessageIdParam'
      responses:
        '200':
          description: SSE stream or JSON response
          content:
            text/event-stream:
              schema:
                type: string
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMessageDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ══════════════════════════════════════════════════════════════════════
  # MODELS
  # ══════════════════════════════════════════════════════════════════════
  /api/models:
    get:
      summary: List available Ollama models
      operationId: listModels
      tags: [Models]
      security: []
      responses:
        '200':
          description: List of available models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListOllamaModelInfo'

  /api/models/active:
    get:
      summary: Get currently active model
      operationId: getActiveModel
      tags: [Models]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active model info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseActiveModelDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Set active model and restart llama-server (OWNER only)
      operationId: setActiveModel
      tags: [Models]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetActiveModelRequest'
      responses:
        '200':
          description: Active model updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseActiveModelDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/models/health:
    get:
      summary: Get inference provider health status
      operationId: getModelHealth
      tags: [Models]
      security: []
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOllamaHealthDto'

  /api/models/server-status:
    get:
      summary: Get llama-server process status
      operationId: getServerStatus
      tags: [Models]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Server status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLlamaServerStatusDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/models/restart:
    post:
      summary: Restart llama-server (OWNER only)
      operationId: restartServer
      tags: [Models]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Server restart initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/models/catalog/search:
    get:
      summary: Search HuggingFace model catalog
      operationId: searchCatalog
      tags: [Models]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            default: gguf
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHfSearchResultDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/models/catalog/{author}/{modelId}:
    get:
      summary: Get HuggingFace model details
      operationId: getModelDetails
      tags: [Models]
      security:
        - bearerAuth: []
      parameters:
        - name: author
          in: path
          required: true
          schema:
            type: string
        - name: modelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Model details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHfModelDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/models/catalog/{author}/{modelId}/files:
    get:
      summary: Get model file list with quantization recommendations
      operationId: getModelFiles
      tags: [Models]
      security:
        - bearerAuth: []
      parameters:
        - name: author
          in: path
          required: true
          schema:
            type: string
        - name: modelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File list with recommendations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListHfModelFileDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/models/download:
    post:
      summary: Start model file download (OWNER only)
      operationId: startDownload
      tags: [Models]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartDownloadRequest'
      responses:
        '200':
          description: Download started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDownloadStartedDto'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      summary: Get all active/recent downloads (OWNER only)
      operationId: getAllDownloads
      tags: [Models]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Download list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/models/download/{downloadId}/progress:
    get:
      summary: Stream download progress via SSE (OWNER only)
      operationId: getDownloadProgress
      tags: [Models]
      security:
        - bearerAuth: []
      parameters:
        - name: downloadId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream of download progress events
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/models/download/{downloadId}:
    delete:
      summary: Cancel download (OWNER only)
      operationId: cancelDownload
      tags: [Models]
      security:
        - bearerAuth: []
      parameters:
        - name: downloadId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Download cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/models/local:
    get:
      summary: List local model files
      operationId: listLocalModels
      tags: [Models]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Local model files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListLocalModelFileDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/models/local/{filename}:
