  /api/models/catalog/search:
    get:
      summary: Search HuggingFace model catalog
      operationId: searchModelCatalog
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            default: gguf
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHfSearchResultDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/models/catalog/{author}/{modelId}:
    get:
      summary: Get HuggingFace model details
      operationId: getModelDetails
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      parameters:
        - name: author
          in: path
          required: true
          schema:
            type: string
        - name: modelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Model details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHfModelDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/models/catalog/{author}/{modelId}/files:
    get:
      summary: List model files with quantization info
      operationId: getModelFiles
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      parameters:
        - name: author
          in: path
          required: true
          schema:
            type: string
        - name: modelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Model files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListHfModelFileDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/models/download:
    post:
      summary: Start model download (OWNER only)
      operationId: startDownload
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartDownloadRequest'
      responses:
        '200':
          description: Download started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDownloadStartedDto'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      summary: List active downloads (OWNER only)
      operationId: listDownloads
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active downloads
          content:
            application/json:
              schema:
