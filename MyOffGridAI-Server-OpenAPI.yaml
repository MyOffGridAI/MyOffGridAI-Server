  /api/models/local:
    get:
      summary: List locally downloaded models
      operationId: listLocalModels
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Local model files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListLocalModelFileDto'

  /api/models/local/{filename}:
    delete:
      summary: Delete local model file (OWNER only)
      operationId: deleteLocalModel
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Model deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/models/active:
    post:
      summary: Set active model (OWNER only)
      operationId: setActiveModel
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetActiveModelRequest'
      responses:
        '200':
          description: Active model updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/models/server-status:
    get:
      summary: Get inference server status
      operationId: getServerStatus
      tags: [Model Downloads]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Server status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLlamaServerStatusDto'

