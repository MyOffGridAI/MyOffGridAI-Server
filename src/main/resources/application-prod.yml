spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/myoffgridai}
    username: ${DB_USERNAME:myoffgridai}
    password: ${DB_PASSWORD:myoffgridai}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  encryption:
    key: ${ENCRYPTION_KEY}
  inference:
    manage-process: true
    provider: ${INFERENCE_PROVIDER:llama-server}
    base-url: ${INFERENCE_BASE_URL:http://localhost:1234}
    model: ${INFERENCE_MODEL:Jackrong/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-GGUF}
    embed-model: ${INFERENCE_EMBED_MODEL:nomic-embed-text}
    llama-server-binary: ${LLAMA_SERVER_BINARY:/usr/local/bin/llama-server}
    models-dir: ${MODELS_DIR:./models}
    active-model: ${ACTIVE_MODEL:}
    port: ${INFERENCE_PORT:1234}
    context-size: ${INFERENCE_CONTEXT_SIZE:4096}
    gpu-layers: ${INFERENCE_GPU_LAYERS:99}
    threads: ${INFERENCE_THREADS:8}
    timeout-seconds: ${INFERENCE_TIMEOUT:120}
    max-tokens: ${INFERENCE_MAX_TOKENS:4096}
    temperature: ${INFERENCE_TEMPERATURE:0.7}
    health-check-interval-seconds: ${HEALTH_CHECK_INTERVAL:30}
    restart-delay-seconds: ${RESTART_DELAY:5}
    startup-timeout-seconds: ${STARTUP_TIMEOUT:120}
  fortress:
    mock: false
  ap:
    mock: false
