spring:
  application:
    name: myoffgridai-server
  profiles:
    active: dev
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/myoffgridai
    username: myoffgridai
    password: myoffgridai
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

app:
  jwt:
    secret: dev-secret-key-minimum-256-bits-long-for-hmac-sha
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  ollama:
    base-url: http://localhost:11434
    model: hf.co/Qwen/Qwen3-32B-GGUF:Q4_K_M
    embed-model: nomic-embed-text
    timeout-seconds: 120
  fortress:
    mock: true
  ap:
    mock: true

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
