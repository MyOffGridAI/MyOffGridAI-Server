spring:
  application:
    name: myoffgridai-server
  profiles:
    active: dev
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 2048MB
      max-request-size: 2048MB

server:
  port: 8080

# ── MCP (Model Context Protocol) Server ──────────────────────────────────
spring.ai.mcp.server:
  name: myoffgridai-mcp
  version: 1.0.0
  type: SYNC
  sse-endpoint: /mcp/sse
  sse-message-endpoint: /mcp/message

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/myoffgridai
    username: myoffgridai
    password: myoffgridai
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

app:
  encryption:
    key: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  jwt:
    secret: dev-secret-key-minimum-256-bits-long-for-hmac-sha
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  inference:
    provider: native
    base-url: http://localhost:1234
    model: Jackrong/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-GGUF
    embed-model: nomic-embed-text
    llama-server-binary: /usr/local/bin/llama-server
    models-dir: ./models
    active-model: ""
    port: 1234
    context-size: 32768
    gpu-layers: 99
    threads: 8
    timeout-seconds: 120
    max-tokens: 4096
    temperature: 0.7
    health-check-interval-seconds: 30
    restart-delay-seconds: 5
    startup-timeout-seconds: 120
    native:
      context-size: 32768
      gpu-layers: 99
      threads: 8
      enable-embedding: false
  ollama:
    base-url: http://localhost:11434
    model: hf.co/Qwen/Qwen3-32B-GGUF:Q4_K_M
    embed-model: nomic-embed-text
    timeout-seconds: 120
  fortress:
    mock: true
  ap:
    mock: true
  rate-limiting:
    enabled: true
  mqtt:
    enabled: false
    broker-url: tcp://localhost:1883
    client-id: myoffgridai-server
  judge:
    enabled: false
    model-filename: ""
    port: 1235
    score-threshold: 7.5
    timeout-seconds: 30
    context-size: 4096
  library:
    zim-directory: ./library/zim
    ebook-directory: ./library/ebooks
    kiwix-url: http://localhost:8888
    calibre-content-server-url: http://localhost:8081
    gutenberg-api-url: https://gutendex.com
    max-upload-size-mb: 2048

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  rate-limiting:
    enabled: true
  mqtt:
    enabled: true
    broker-url: tcp://localhost:1883
    client-id: myoffgridai-server
