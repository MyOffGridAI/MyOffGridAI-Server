<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyOffGrid AI Setup</title>
    <link rel="stylesheet" href="/setup/setup.css">
</head>
<body>
    <div class="container">
        <!-- Progress -->
        <div class="progress-bar">
            <div class="progress-step active"></div>
            <div class="progress-step"></div>
            <div class="progress-step"></div>
            <div class="progress-step"></div>
        </div>

        <!-- Logo -->
        <div class="logo">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="30" fill="#2D5016" opacity="0.1"/>
                <circle cx="32" cy="32" r="24" fill="#2D5016" opacity="0.2"/>
                <path d="M32 12 L48 28 L48 48 L16 48 L16 28 Z" fill="#2D5016" stroke="#2D5016" stroke-width="2" stroke-linejoin="round"/>
                <circle cx="32" cy="33" r="6" fill="#F5F0E8"/>
                <circle cx="32" cy="33" r="3" fill="#8B5E1A"/>
            </svg>
        </div>

        <!-- Content -->
        <h1>Welcome to MyOffGrid AI</h1>
        <p class="tagline">Your world, remembered.</p>

        <p class="description">
            This device is your private AI companion — it runs entirely on your
            hardware, your network, with your data. No cloud, no subscriptions,
            no one listening.
        </p>
        <p class="description">
            Let's get it set up. It takes about 2 minutes.
        </p>

        <!-- CTA -->
        <a href="/setup/wifi" class="btn btn-primary">Get Started &rarr;</a>
    </div>
</body>
</html>
