spring:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

app:
  jwt:
    secret: test-secret-key-minimum-256-bits-long-for-hmac-sha-signing-tests
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000
  ap:
    mock: true
  fortress:
    mock: true
  rate-limiting:
    enabled: false
  mqtt:
    enabled: false
  library:
    zim-directory: ${java.io.tmpdir}/myoffgridai-test/zim
    ebook-directory: ${java.io.tmpdir}/myoffgridai-test/ebooks
    kiwix-url: http://localhost:8888
    calibre-content-server-url: http://localhost:8081
    gutenberg-api-url: https://gutendex.com
    max-upload-size-mb: 2048
